<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MassageMap</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Inner page header ── */
    .header {
      position: relative;
    }

    .header__back {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--accent-light);
      font-size: var(--text-sm);
      font-weight: 500;
      text-decoration: none;
      min-width: 72px;
      padding: var(--space-2);
      margin: calc(-1 * var(--space-2));
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      transition: color var(--ease);
    }

    .header__back:hover { color: var(--text); }

    .header__page-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: var(--text-base);
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
      pointer-events: none;
      margin: 0;
    }

    /* ── Stepper layout ── */
    .stepper-layout {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }
    .stepper-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 2px;
      flex-shrink: 0;
    }
    .stepper-ball {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
      text-decoration: none;
      line-height: 1;
    }
    .stepper-ball--active {
      background: #6c63ff;
      color: #fff;
    }
    .stepper-ball--past {
      background: #2a2f3d;
      border: 1.5px solid #4a5568;
      color: #4a5568;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .stepper-ball--past:hover {
      border-color: #6c63ff;
      color: #6c63ff;
    }
    .stepper-line {
      width: 1.5px;
      height: 20px;
      background: #2a2f3d;
    }
    .content-col {
      flex: 1;
      min-width: 0;
    }

    /* ── Profile gallery ── */
    .profile-gallery { margin-bottom: 14px; }
    .profile-photo__main-wrap { max-width: 300px; margin: 0 auto; }
    .profile-photo__main { width: 100%; height: auto; border-radius: 12px; display: block; }
    .profile-photo__thumbs {
      display: flex; gap: 8px; margin-top: 8px;
      max-width: 300px; margin-left: auto; margin-right: auto; overflow-x: auto;
    }
    .profile-photo__thumb {
      width: 60px; height: 60px; object-fit: cover; border-radius: 6px;
      cursor: pointer; border: 2px solid transparent; flex-shrink: 0; transition: border-color 0.15s;
    }
    .profile-photo__thumb--active { border-color: #6c63ff; }
    .profile-initials-wrap { display: flex; justify-content: center; margin-bottom: 14px; }
    .profile-initials {
      width: 56px; height: 56px; border-radius: 50%; background: #6c63ff;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; color: #fff; letter-spacing: 0.5px;
    }

    /* ── Profile identity ── */
    .profile-identity {
      text-align: center;
      margin-bottom: 20px;
    }
    .profile-identity__name {
      font-size: 17px;
      font-weight: 500;
      color: #e2e8f0;
      margin-bottom: 4px;
    }
    .profile-identity__meta {
      font-size: 12px;
      color: #8892a4;
      margin-bottom: 10px;
    }

    /* ── Massage type badge ── */
    .mtype-badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      line-height: 1.4;
      white-space: nowrap;
    }
    .mtype--massage { background: #3C3489; color: #CECBF6; }
    .mtype--adult   { background: #854F0B; color: #FAC775; }
    .mtype--chinese { background: #085041; color: #9FE1CB; }
    .mtype--indian  { background: #085041; color: #9FE1CB; }
    .mtype--sport   { background: #0C447C; color: #B5D4F4; }
    .mtype--reiki   { background: #3C3489; color: #CECBF6; }

    /* ── Expandable buttons ── */
    .expand-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .expand-item {
      display: flex;
      flex-direction: column;
    }
    .expand-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-radius: 12px;
      border: 0.5px solid #6c63ff;
      font-size: var(--text-base);
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      font-family: var(--font-sans);
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }
    .expand-btn--outline {
      background: #161b27;
      color: #6c63ff;
    }
    .expand-btn--filled {
      background: #6c63ff;
      color: #fff;
    }
    .expand-btn:hover { opacity: 0.85; }
    .expand-btn.is-open { border-radius: 12px 12px 0 0; }

    .expand-chevron {
      font-size: 16px;
      line-height: 1;
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .expand-btn.is-open .expand-chevron {
      transform: rotate(180deg);
    }

    .expand-panel {
      display: none;
      padding: 14px 16px;
      border: 0.5px solid #6c63ff;
      border-top: none;
      border-radius: 0 0 12px 12px;
      background: #161b27;
    }
    .expand-panel.is-open { display: block; }

    /* ── Hours rows ── */
    .hours-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: var(--text-sm);
      padding: 3px 0;
    }
    .hours-row__day  { color: #8892a4; }
    .hours-row__time { color: #e2e8f0; font-variant-numeric: tabular-nums; }

    /* ── Massage type pills in panel ── */
    .mtype-pill-cluster {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .mtype-pill {
      background: #1e2435;
      color: #e2e8f0;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: var(--text-sm);
    }

    /* ── Contact buttons ── */
    .contact-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .contact-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #1e2435;
      border-radius: 10px;
      padding: 10px 12px;
      color: #e2e8f0;
      font-size: var(--text-sm);
      font-weight: 500;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    .contact-btn:hover { background: #252d42; }

    /* ── Empty / error state ── */
    .empty-state {
      text-align: center;
      padding: var(--space-8) var(--space-4);
      color: var(--text-muted);
    }
    .empty-state__icon {
      font-size: 2.5rem;
      margin-bottom: var(--space-3);
    }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════════
       Fixed Header
  ══════════════════════════════════════ -->
  <header class="header">
    <a id="backBtn" href="listings.html" class="header__back">‹ Back</a>
    <h1 class="header__page-title" id="pageTitle">Profile</h1>
    <div style="min-width:72px"></div>
  </header>


  <!-- ══════════════════════════════════════
       Main Content
  ══════════════════════════════════════ -->
  <main class="page">
    <div class="stepper-layout">
      <div class="stepper-col" id="stepperCol"></div>
      <div class="content-col">
        <div id="content"></div>
      </div>
    </div>
  </main>


  <!-- ══════════════════════════════════════
       Bottom Navigation
  ══════════════════════════════════════ -->
  <nav class="bottom-nav" aria-label="Main navigation">
    <ul class="bottom-nav__list">
      <li class="bottom-nav__item">
        <a href="index.html" class="bottom-nav__link">
          <span aria-hidden="true">🏠</span>
          <span>Home</span>
        </a>
      </li>
      <li class="bottom-nav__item">
        <button class="bottom-nav__link">
          <span aria-hidden="true">🗺️</span>
          <span>Map</span>
        </button>
      </li>
      <li class="bottom-nav__item">
        <button class="bottom-nav__link">
          <span aria-hidden="true">✍️</span>
          <span>Register</span>
        </button>
      </li>
      <li class="bottom-nav__item">
        <button class="bottom-nav__link">
          <span aria-hidden="true">⚙️</span>
          <span>Admin</span>
        </button>
      </li>
    </ul>
  </nav>


  <script type="module">
    import { db } from './firebase-config.js';
    import { doc, getDoc }
      from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

    /* ── URL params ───────────────────────────────────────── */
    const params   = new URLSearchParams(window.location.search);
    const id       = params.get('id')       || '';
    const suburb   = params.get('suburb')   || '';
    const province = params.get('province') || '';
    const type     = params.get('type')     || '';

    /* ── Back button ──────────────────────────────────────── */
    {
      let backHref = 'listings.html';
      const bp = [];
      if (suburb)   bp.push(`suburb=${encodeURIComponent(suburb)}`);
      if (province) bp.push(`province=${encodeURIComponent(province)}`);
      if (type)     bp.push(`type=${encodeURIComponent(type)}`);
      if (bp.length) backHref += '?' + bp.join('&');
      document.getElementById('backBtn').href = backHref;
    }

    /* ── DOM refs ─────────────────────────────────────────── */
    const content = document.getElementById('content');

    /* ── Stepper ─────────────────────────────────────────── */
    (function buildStepper() {
      const col = document.getElementById('stepperCol');
      const hrefs = [
        'index.html',
        `suburb.html?type=${encodeURIComponent(type)}`,
        `suburb.html?type=${encodeURIComponent(type)}&province=${encodeURIComponent(province)}`,
        `listings.html?suburb=${encodeURIComponent(suburb)}&province=${encodeURIComponent(province)}&type=${encodeURIComponent(type)}`,
      ];
      let html = '';
      for (let i = 0; i < 5; i++) {
        if (i > 0) html += '<div class="stepper-line"></div>';
        const n = i + 1;
        if (n === 5) {
          html += `<div class="stepper-ball stepper-ball--active">${n}</div>`;
        } else {
          html += `<a href="${hrefs[i]}" class="stepper-ball stepper-ball--past">${n}</a>`;
        }
      }
      col.innerHTML = html;
    })();

    /* ── Helpers ─────────────────────────────────────────── */
    function massageTypeBadge(val) {
      const label = (val || 'Massage').trim();
      const clsMap = {
        'Massage': 'mtype--massage',
        'Adult':   'mtype--adult',
        'Chinese': 'mtype--chinese',
        'Indian':  'mtype--indian',
        'Sport':   'mtype--sport',
        'Reiki':   'mtype--reiki',
      };
      const cls = clsMap[label] || 'mtype--massage';
      return `<span class="mtype-badge ${cls}">${label}</span>`;
    }

    function getInitials(name) {
      const words = (name || '').trim().split(/\s+/).filter(Boolean);
      if (!words.length) return '?';
      if (words.length === 1) return words[0][0].toUpperCase();
      return (words[0][0] + words[words.length - 1][0]).toUpperCase();
    }

    function getPhotoUrls(t) {
      if (t.photos && t.photos.length) {
        return t.photos.map(p => typeof p === 'string' ? p : (p && p.url ? p.url : null)).filter(Boolean);
      }
      if (t.photoVisible === 'public' && t.photoUrl) return [t.photoUrl];
      return [];
    }

    function saToWa(phone) {
      const digits = (phone || '').replace(/\D/g, '');
      if (!digits) return '';
      if (digits.startsWith('27')) return digits;
      if (digits.startsWith('0')) return '27' + digits.slice(1);
      return digits;
    }

    function saToTel(phone) {
      const digits = (phone || '').replace(/\D/g, '');
      if (!digits) return '';
      if (digits.startsWith('27')) return '+' + digits;
      if (digits.startsWith('0')) return '+27' + digits.slice(1);
      return '+' + digits;
    }

    function renderHours(weeklyHours, availableFrom, availableTo) {
      if (!weeklyHours) {
        if (availableFrom && availableTo) {
          return `<div class="hours-row">
            <span class="hours-row__day">Mon – Sun</span>
            <span class="hours-row__time">${availableFrom} – ${availableTo}</span>
          </div>`;
        }
        return '<p style="color:var(--text-muted);font-size:var(--text-sm);margin:0">Not specified</p>';
      }

      const DAYS   = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
      const LABELS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

      const rows = DAYS.map((d, i) => {
        const h = weeklyHours[d];
        let time = 'Closed';
        if (h) {
          if (typeof h === 'string') time = h;
          else if (h.from && h.to)  time = `${h.from} – ${h.to}`;
        }
        return { label: LABELS[i], time };
      });

      const allSame = rows.every(r => r.time === rows[0].time) && rows[0].time !== 'Closed';
      if (allSame) {
        return `<div class="hours-row">
          <span class="hours-row__day">Mon – Sun</span>
          <span class="hours-row__time">${rows[0].time}</span>
        </div>`;
      }

      return rows.map(r =>
        `<div class="hours-row">
          <span class="hours-row__day">${r.label}</span>
          <span class="hours-row__time">${r.time}</span>
        </div>`
      ).join('');
    }

    /* ── Panel toggle ─────────────────────────────────────── */
    function togglePanel(n) {
      for (let i = 1; i <= 3; i++) {
        const btn   = document.getElementById(`expandBtn${i}`);
        const panel = document.getElementById(`expandPanel${i}`);
        if (!btn || !panel) continue;
        if (i === n) {
          const isOpen = panel.classList.contains('is-open');
          btn.classList.toggle('is-open', !isOpen);
          panel.classList.toggle('is-open', !isOpen);
        } else {
          btn.classList.remove('is-open');
          panel.classList.remove('is-open');
        }
      }
    }

    function attachExpandListeners() {
      for (let i = 1; i <= 3; i++) {
        const n = i;
        document.getElementById(`expandBtn${n}`)
          ?.addEventListener('click', () => togglePanel(n));
      }
    }

    /* ── Load & render ────────────────────────────────────── */
    async function init() {
      if (!id) {
        document.title = 'Profile — MassageMap';
        document.getElementById('pageTitle').textContent = 'Profile';
        content.innerHTML = `
          <div class="empty-state">
            <div class="empty-state__icon">👤</div>
            <p>No therapist specified</p>
            <p class="text-sm text-muted" style="margin-top:var(--space-2)">
              <a href="index.html">← Back to home</a>
            </p>
          </div>`;
        return;
      }

      content.innerHTML =
        '<p style="color:var(--text-muted);font-size:var(--text-sm);padding:var(--space-4)">Loading…</p>';

      try {
        const snap = await getDoc(doc(db, 'suppliers', id));

        if (!snap.exists()) {
          document.title = 'Profile — MassageMap';
          document.getElementById('pageTitle').textContent = 'Profile';
          content.innerHTML = `
            <div class="empty-state">
              <div class="empty-state__icon">👤</div>
              <p>Therapist not found</p>
              <p class="text-sm text-muted" style="margin-top:var(--space-2)">
                <a href="index.html">← Back to home</a>
              </p>
            </div>`;
          return;
        }

        const t           = snap.data();
        const displayName = t.displayName || t.firstName || 'Therapist';
        const photos = getPhotoUrls(t);

        document.title = `${displayName} — MassageMap`;
        document.getElementById('pageTitle').textContent = displayName;

        /* Photo gallery or initials */
        let photoSectionHtml;
        if (photos.length) {
          const thumbsHtml = photos.length > 1
            ? `<div class="profile-photo__thumbs">${photos.map((url, i) => `<img class="profile-photo__thumb${i === 0 ? ' profile-photo__thumb--active' : ''}" src="${url}" alt="" data-idx="${i}">`).join('')}</div>`
            : '';
          photoSectionHtml = `<div class="profile-gallery"><div class="profile-photo__main-wrap"><img id="profileMainPhoto" class="profile-photo__main" src="${photos[0]}" alt="${displayName}"></div>${thumbsHtml}</div>`;
        } else {
          photoSectionHtml = `<div class="profile-initials-wrap"><div class="profile-initials">${getInitials(displayName)}</div></div>`;
        }

        /* Gender · suburb meta line */
        const genderStr = type !== 'spa' && t.gender
          ? (t.gender === 'female' ? 'Female' : t.gender === 'male' ? 'Male' : t.gender)
          : '';
        const metaParts = [genderStr, t.suburb || suburb].filter(Boolean);
        const metaLine  = metaParts.join(' · ');

        /* Massage types panel */
        const massageTypesPills = (t.massageTypes && t.massageTypes.length)
          ? `<div class="mtype-pill-cluster">
               ${t.massageTypes.map(mt => `<span class="mtype-pill">${mt}</span>`).join('')}
             </div>`
          : '<p style="color:var(--text-muted);font-size:var(--text-sm);margin:0">Not specified</p>';

        /* Hours panel */
        const hoursHtml = renderHours(t.weeklyHours, t.availableFrom, t.availableTo);

        /* Contact panel */
        let contactHtml;
        if (type !== 'spa') {
          const rawPhone = t.cellNumber || t.whatsappNumber || t.phone || t.phoneNumber || '';
          const waNum    = saToWa(rawPhone);
          const telNum   = saToTel(rawPhone);
          const waLink   = waNum  ? `<a href="https://wa.me/${waNum}" class="contact-btn" target="_blank" rel="noopener noreferrer"><span>💬</span><span>WhatsApp</span></a>` : '';
          const telLink  = telNum ? `<a href="tel:${telNum}" class="contact-btn"><span>📞</span><span>Call</span></a>` : '';
          contactHtml = waLink || telLink
            ? `<div class="contact-group">${waLink}${telLink}</div>`
            : '<p style="color:var(--text-muted);font-size:var(--text-sm);margin:0">No contact details available</p>';
        } else {
          const enquiryUrl = `enquiry.html?supplierId=${encodeURIComponent(id)}&displayName=${encodeURIComponent(displayName)}`;
          contactHtml = `<div class="contact-group">
            <a href="${enquiryUrl}" class="contact-btn"><span>✉️</span><span>Send Enquiry</span></a>
          </div>`;
        }

        content.innerHTML = `
          <!-- Photo gallery -->
          ${photoSectionHtml}

          <!-- Identity -->
          <div class="profile-identity">
            <div class="profile-identity__name">${displayName}</div>
            ${metaLine ? `<div class="profile-identity__meta">${metaLine}</div>` : ''}
            ${massageTypeBadge(t.displayMassageType)}
          </div>

          <!-- Expandable sections -->
          <div class="expand-group">

            <div class="expand-item">
              <button class="expand-btn expand-btn--outline" id="expandBtn1">
                <span>Types of massage</span>
                <span class="expand-chevron">▾</span>
              </button>
              <div class="expand-panel" id="expandPanel1">
                ${massageTypesPills}
              </div>
            </div>

            <div class="expand-item">
              <button class="expand-btn expand-btn--outline" id="expandBtn2">
                <span>Working hours</span>
                <span class="expand-chevron">▾</span>
              </button>
              <div class="expand-panel" id="expandPanel2">
                ${hoursHtml}
              </div>
            </div>

            <div class="expand-item">
              <button class="expand-btn expand-btn--filled" id="expandBtn3">
                <span>Contact details</span>
                <span class="expand-chevron">▾</span>
              </button>
              <div class="expand-panel" id="expandPanel3">
                ${contactHtml}
              </div>
            </div>

          </div>`;

        attachExpandListeners();

        /* Thumbnail click → swap main photo */
        content.querySelectorAll('.profile-photo__thumb').forEach(thumb => {
          thumb.addEventListener('click', () => {
            document.getElementById('profileMainPhoto').src = thumb.src;
            content.querySelectorAll('.profile-photo__thumb').forEach(t => t.classList.remove('profile-photo__thumb--active'));
            thumb.classList.add('profile-photo__thumb--active');
          });
        });

      } catch (err) {
        console.error('Firestore error:', err);
        content.innerHTML =
          '<p style="color:var(--text-muted);padding:var(--space-4)">Failed to load profile. Please refresh.</p>';
      }
    }

    init();
  </script>

</body>
</html>
