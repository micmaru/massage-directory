<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MassageMap</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Inner page header ── */
    .header {
      position: relative;
    }

    .header__back {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--accent-light);
      font-size: var(--text-sm);
      font-weight: 500;
      text-decoration: none;
      min-width: 72px;
      padding: var(--space-2);
      margin: calc(-1 * var(--space-2));
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      transition: color var(--ease);
    }
    .header__back:hover { color: var(--text); }

    .header__page-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: var(--text-base);
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
      pointer-events: none;
      margin: 0;
    }

    /* ── Section header ── */
    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding-top: var(--space-2);
      margin-bottom: var(--space-4);
    }

    /* ── Province grid ── */
    .province-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
    }

    .province-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--space-4) var(--space-4) var(--space-3);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 5px;
      text-decoration: none;
      font-family: var(--font-sans);
      text-align: left;
      transition: background var(--ease), border-color var(--ease), box-shadow var(--ease);
      -webkit-tap-highlight-color: transparent;
    }
    .province-card:hover  { background: var(--bg-card-hover); }
    .province-card:active { transform: scale(0.97); }

    .province-card__name {
      font-size: var(--text-sm);
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    .province-card__count {
      font-size: var(--text-xs);
      color: var(--text-muted);
      line-height: 1;
    }

    /* ── Area group (suburb list) ── */
    .area-group {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .area-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 15px var(--space-4);
      border-top: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      font-family: var(--font-sans);
      font-size: var(--text-base);
      transition: background var(--ease);
      -webkit-tap-highlight-color: transparent;
    }
    .area-item:first-child { border-top: none; }
    .area-item:hover  { background: var(--bg-card-hover); }
    .area-item:active { background: rgba(255, 255, 255, 0.04); }

    .area-item__name { font-weight: 500; }

    .area-item__right {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      flex-shrink: 0;
    }

    .area-item__count {
      font-size: var(--text-sm);
      color: var(--text-muted);
      min-width: 24px;
      text-align: right;
    }

    .area-item__chevron {
      color: var(--text-muted);
      font-size: 18px;
      opacity: 0.35;
      line-height: 1;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: var(--space-8) var(--space-4);
      color: var(--text-muted);
    }
    .empty-state__icon {
      font-size: 2.5rem;
      margin-bottom: var(--space-3);
    }

    /* ── Stepper layout ── */
    .stepper-layout {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }
    .stepper-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 2px;
      flex-shrink: 0;
    }
    .stepper-ball {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
      text-decoration: none;
      line-height: 1;
    }
    .stepper-ball--active {
      background: #6c63ff;
      color: #fff;
    }
    .stepper-ball--past {
      background: #2a2f3d;
      border: 1.5px solid #4a5568;
      color: #4a5568;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .stepper-ball--past:hover {
      border-color: #6c63ff;
      color: #6c63ff;
    }
    .stepper-line {
      width: 1.5px;
      height: 20px;
      background: #2a2f3d;
    }
    .content-col {
      flex: 1;
      min-width: 0;
    }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════════
       Fixed Header
  ══════════════════════════════════════ -->
  <header class="header">
    <a id="backBtn" href="index.html" class="header__back">‹ Back</a>
    <h1 class="header__page-title" id="pageTitle">Browse</h1>
    <div style="min-width:72px"></div>
  </header>


  <!-- ══════════════════════════════════════
       Main Content
  ══════════════════════════════════════ -->
  <main class="page">

    <div class="stepper-layout">
      <div class="stepper-col" id="stepperCol"></div>
      <div class="content-col">

        <div class="section-header">
          <span class="section-title" id="sectionLabel" style="margin:0">Province</span>
          <span class="text-muted text-sm" id="summary"></span>
        </div>

        <div id="content"></div>

      </div>
    </div>

  </main>


  <!-- ══════════════════════════════════════
       Bottom Navigation
  ══════════════════════════════════════ -->
  <nav class="bottom-nav" aria-label="Main navigation">
    <ul class="bottom-nav__list">
      <li class="bottom-nav__item">
        <a href="index.html" class="bottom-nav__link">
          <span aria-hidden="true">🏠</span>
          <span>Home</span>
        </a>
      </li>
      <li class="bottom-nav__item">
        <button class="bottom-nav__link">
          <span aria-hidden="true">🗺️</span>
          <span>Map</span>
        </button>
      </li>
      <li class="bottom-nav__item">
        <a href="register.html" class="bottom-nav__link">
          <span aria-hidden="true">✍️</span>
          <span>Register</span>
        </a>
      </li>
      <li class="bottom-nav__item">
        <button class="bottom-nav__link">
          <span aria-hidden="true">⚙️</span>
          <span>Admin</span>
        </button>
      </li>
    </ul>
  </nav>


  <script type="module">
    import { db } from './firebase-config.js';
    import { collection, query, where, getDocs }
      from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

    /* ── Province data ────────────────────────────────────── */
    const PROVINCES = [
      { id: 'gauteng',       name: 'Gauteng'       },
      { id: 'western-cape',  name: 'Western Cape'  },
      { id: 'kwazulu-natal', name: 'KwaZulu-Natal' },
      { id: 'eastern-cape',  name: 'Eastern Cape'  },
      { id: 'free-state',    name: 'Free State'    },
      { id: 'north-west',    name: 'North West'    },
      { id: 'mpumalanga',    name: 'Mpumalanga'    },
      { id: 'limpopo',       name: 'Limpopo'       },
      { id: 'northern-cape', name: 'Northern Cape' },
    ];
    const PROVINCE_BY_NAME = Object.fromEntries(PROVINCES.map(p => [p.name, p.id]));

    /* ── URL params ───────────────────────────────────────── */
    const params       = new URLSearchParams(window.location.search);
    const type         = params.get('type')     || '';
    const provinceName = params.get('province') || '';
    const provinceId   = PROVINCE_BY_NAME[provinceName] || '';

    /* ── Labels ───────────────────────────────────────────── */
    const typeLabel   = type === 'individual' ? 'Therapists'
                      : type === 'spa'        ? 'Spas'
                      : 'Browse';
    const itemSingular = type === 'spa' ? 'spa'       : 'therapist';
    const itemPlural   = type === 'spa' ? 'spas'      : 'therapists';
    const countStr     = n => `${n} ${n !== 1 ? itemPlural : itemSingular}`;

    /* ── DOM refs ─────────────────────────────────────────── */
    const content      = document.getElementById('content');
    const summary      = document.getElementById('summary');
    const sectionLabel = document.getElementById('sectionLabel');

    /* ── Stepper ─────────────────────────────────────────── */
    function buildStepper(step) {
      const col = document.getElementById('stepperCol');
      const hrefs = [
        'index.html',
        `suburb.html?type=${encodeURIComponent(type)}`,
      ];
      let html = '';
      for (let i = 0; i < step; i++) {
        if (i > 0) html += '<div class="stepper-line"></div>';
        const n = i + 1;
        if (n === step) {
          html += `<div class="stepper-ball stepper-ball--active">${n}</div>`;
        } else {
          html += `<a href="${hrefs[i]}" class="stepper-ball stepper-ball--past">${n}</a>`;
        }
      }
      col.innerHTML = html;
    }

    /* ── Page head ────────────────────────────────────────── */
    if (provinceName) {
      document.title = `${provinceName} — MassageMap`;
      document.getElementById('pageTitle').textContent = provinceName;
      document.getElementById('backBtn').href =
        `suburb.html?type=${encodeURIComponent(type)}`;
      sectionLabel.textContent = 'Areas';
      buildStepper(3);
      showSuburbList();
    } else {
      document.title = `${typeLabel} — MassageMap`;
      document.getElementById('pageTitle').textContent = typeLabel;
      document.getElementById('backBtn').href = 'index.html';
      sectionLabel.textContent = 'Province';
      buildStepper(2);
      showProvinceGrid();
    }

    /* ── Province grid ────────────────────────────────────── */
    async function showProvinceGrid() {
      content.innerHTML =
        '<p style="color:var(--text-muted);font-size:var(--text-sm);padding:var(--space-4)">Loading…</p>';

      try {
        const constraints = [where('status', '==', 'active')];
        if (type) constraints.push(where('supplierType', '==', type));

        const snap = await getDocs(query(collection(db, 'suppliers'), ...constraints));

        const provinceCounts = {};
        snap.forEach(docSnap => {
          const d = docSnap.data();
          if (d.classification === 'adult') return;
          const pId = d.province || '';
          provinceCounts[pId] = (provinceCounts[pId] || 0) + 1;
        });

        const grandTotal = Object.values(provinceCounts).reduce((s, n) => s + n, 0);
        summary.textContent = countStr(grandTotal);

        content.innerHTML = `
          <div class="province-grid">
            ${PROVINCES.map(p => {
              const count = provinceCounts[p.id] || 0;
              return `
                <a
                  href="suburb.html?type=${encodeURIComponent(type)}&province=${encodeURIComponent(p.name)}"
                  class="province-card"
                >
                  <span class="province-card__name">${p.name}</span>
                  <span class="province-card__count">${countStr(count)}</span>
                </a>`;
            }).join('')}
          </div>`;
      } catch (err) {
        console.error('Firestore error:', err);
        content.innerHTML =
          '<p style="color:var(--text-muted);padding:var(--space-4)">Failed to load. Please refresh.</p>';
      }
    }

    /* ── Suburb list ──────────────────────────────────────── */
    async function showSuburbList() {
      if (!provinceId) {
        content.innerHTML = `
          <div class="empty-state">
            <div class="empty-state__icon">🗺️</div>
            <p>Province not found</p>
            <p class="text-sm text-muted" style="margin-top:var(--space-2)">
              <a href="index.html">← Back to home</a>
            </p>
          </div>`;
        return;
      }

      content.innerHTML =
        '<p style="color:var(--text-muted);font-size:var(--text-sm);padding:var(--space-4)">Loading…</p>';

      try {
        const constraints = [
          where('province', '==', provinceId),
          where('status',   '==', 'active'),
        ];
        if (type) constraints.push(where('supplierType', '==', type));

        const snap = await getDocs(query(collection(db, 'suppliers'), ...constraints));

        const suburbMap = {};
        snap.forEach(docSnap => {
          const d = docSnap.data();
          if (d.classification === 'adult' || !d.suburb) return;
          suburbMap[d.suburb] = (suburbMap[d.suburb] || 0) + 1;
        });

        const suburbs = Object.entries(suburbMap)
          .filter(([, c]) => c > 0)
          .sort(([a], [b]) => a.localeCompare(b));

        if (suburbs.length === 0) {
          summary.textContent = countStr(0);
          content.innerHTML = `
            <div class="empty-state">
              <div class="empty-state__icon">💆</div>
              <p>No ${itemPlural} listed yet in ${provinceName}</p>
              <p class="text-sm text-muted" style="margin-top:var(--space-2)">
                <a href="index.html">← Back to home</a>
              </p>
            </div>`;
          return;
        }

        const total = suburbs.reduce((s, [, c]) => s + c, 0);
        summary.textContent =
          `${suburbs.length} area${suburbs.length !== 1 ? 's' : ''} · ${countStr(total)}`;

        content.innerHTML = `
          <div class="area-group">
            ${suburbs.map(([suburb, count]) => `
              <a
                href="listings.html?suburb=${encodeURIComponent(suburb)}&province=${encodeURIComponent(provinceName)}&type=${encodeURIComponent(type)}"
                class="area-item"
              >
                <span class="area-item__name">${suburb}</span>
                <span class="area-item__right">
                  <span class="area-item__count">${count}</span>
                  <span class="area-item__chevron">›</span>
                </span>
              </a>`).join('')}
          </div>`;
      } catch (err) {
        console.error('Firestore error:', err);
        content.innerHTML =
          '<p style="color:var(--text-muted);padding:var(--space-4)">Failed to load. Please refresh.</p>';
      }
    }
  </script>

</body>
</html>
