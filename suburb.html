<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MassageMap</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Inner page header ── */
    .header {
      position: relative; /* needed for absolute-centered title */
    }

    .header__back {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--accent-light);
      font-size: var(--text-sm);
      font-weight: 500;
      text-decoration: none;
      min-width: 72px;
      padding: var(--space-2);
      margin: calc(-1 * var(--space-2));
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      transition: color var(--ease);
    }

    .header__back:hover { color: var(--text); }

    .header__page-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: var(--text-base);
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
      pointer-events: none;
      margin: 0;
    }

    /* ── Section header ── */
    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding-top: var(--space-2);
      margin-bottom: var(--space-4);
    }

    /* ── Area group (grouped list card) ── */
    .area-group {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    /* ── Area row ── */
    .area-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 15px var(--space-4);
      border-top: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      font-family: var(--font-sans);
      font-size: var(--text-base);
      transition: background var(--ease);
      -webkit-tap-highlight-color: transparent;
    }

    .area-item:first-child {
      border-top: none;
    }

    .area-item:hover {
      background: var(--bg-card-hover);
    }

    .area-item:active {
      background: rgba(255, 255, 255, 0.04);
    }

    .area-item__name {
      font-weight: 500;
    }

    .area-item__right {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      flex-shrink: 0;
    }

    .area-item__count {
      font-size: var(--text-sm);
      color: var(--text-muted);
      min-width: 24px;
      text-align: right;
    }

    .area-item__chevron {
      color: var(--text-muted);
      font-size: 18px;
      opacity: 0.35;
      line-height: 1;
    }

    /* ── Error / empty state ── */
    .empty-state {
      text-align: center;
      padding: var(--space-8) var(--space-4);
      color: var(--text-muted);
    }

    .empty-state__icon {
      font-size: 2.5rem;
      margin-bottom: var(--space-3);
    }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════════
       Fixed Header
  ══════════════════════════════════════ -->
  <header class="header">
    <a href="index.html" class="header__back">‹ Back</a>
    <h1 class="header__page-title" id="pageTitle">Province</h1>
    <div style="min-width:72px"></div><!-- balance right side -->
  </header>


  <!-- ══════════════════════════════════════
       Main Content
  ══════════════════════════════════════ -->
  <main class="page">

    <div class="section-header">
      <span class="section-title" style="margin:0">Areas</span>
      <span class="text-muted text-sm" id="summary"></span>
    </div>

    <div id="content"></div>

  </main>


  <!-- ══════════════════════════════════════
       Bottom Navigation
  ══════════════════════════════════════ -->
  <nav class="bottom-nav" aria-label="Main navigation">
    <ul class="bottom-nav__list">
      <li class="bottom-nav__item">
        <a href="index.html" class="bottom-nav__link">
          <span aria-hidden="true">🏠</span>
          <span>Home</span>
        </a>
      </li>
      <li class="bottom-nav__item">
        <button class="bottom-nav__link">
          <span aria-hidden="true">🗺️</span>
          <span>Map</span>
        </button>
      </li>
      <li class="bottom-nav__item">
        <button class="bottom-nav__link">
          <span aria-hidden="true">✍️</span>
          <span>Register</span>
        </button>
      </li>
      <li class="bottom-nav__item">
        <button class="bottom-nav__link">
          <span aria-hidden="true">⚙️</span>
          <span>Admin</span>
        </button>
      </li>
    </ul>
  </nav>


  <script type="module">
    import { db } from './firebase-config.js';
    import { collection, query, where, getDocs }
      from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

    /* ── Province display name → Firestore ID ─────────────── */
    const PROVINCE_ID = {
      'Gauteng':       'gauteng',
      'Western Cape':  'western-cape',
      'KwaZulu-Natal': 'kwazulu-natal',
      'Eastern Cape':  'eastern-cape',
      'Free State':    'free-state',
      'Limpopo':       'limpopo',
      'Mpumalanga':    'mpumalanga',
      'North West':    'north-west',
      'Northern Cape': 'northern-cape',
    };

    /* ── URL params ───────────────────────────────────────── */
    const params       = new URLSearchParams(window.location.search);
    const provinceName = params.get('province') || '';
    const provinceId   = PROVINCE_ID[provinceName] || '';

    /* ── Page title ───────────────────────────────────────── */
    document.title = provinceName ? `${provinceName} — MassageMap` : 'MassageMap';
    document.getElementById('pageTitle').textContent = provinceName || 'Province';

    /* ── DOM refs ─────────────────────────────────────────── */
    const content = document.getElementById('content');
    const summary = document.getElementById('summary');

    /* ── Load & render ────────────────────────────────────── */
    async function init() {
      if (!provinceName || !provinceId) {
        content.innerHTML = `
          <div class="empty-state">
            <div class="empty-state__icon">🗺️</div>
            <p>Province not found</p>
            <p class="text-sm text-muted" style="margin-top:var(--space-2)">
              <a href="index.html">← Back to home</a>
            </p>
          </div>`;
        return;
      }

      content.innerHTML =
        '<p style="color:var(--text-muted);font-size:var(--text-sm);padding:var(--space-4)">Loading…</p>';

      try {
        const snap = await getDocs(
          query(
            collection(db, 'suppliers'),
            where('province', '==', provinceId),
            where('status',   '==', 'active')
          )
        );

        // Group by suburb — exclude adult classification
        const suburbMap = {};
        snap.forEach(docSnap => {
          const d = docSnap.data();
          if (d.classification === 'adult' || !d.suburb) return;
          suburbMap[d.suburb] = (suburbMap[d.suburb] || 0) + 1;
        });

        const suburbs = Object.entries(suburbMap)
          .filter(([, count]) => count > 0)
          .sort(([a], [b]) => a.localeCompare(b));

        if (suburbs.length === 0) {
          summary.textContent = '0 therapists';
          content.innerHTML = `
            <div class="empty-state">
              <div class="empty-state__icon">💆</div>
              <p>No therapists listed yet in ${provinceName}</p>
              <p class="text-sm text-muted" style="margin-top:var(--space-2)">
                <a href="index.html">← Back to home</a>
              </p>
            </div>`;
          return;
        }

        const total = suburbs.reduce((s, [, c]) => s + c, 0);
        summary.textContent =
          `${suburbs.length} suburb${suburbs.length !== 1 ? 's' : ''} · ${total} therapist${total !== 1 ? 's' : ''}`;

        content.innerHTML = `
          <div class="area-group">
            ${suburbs.map(([suburb, count]) => `
              <a
                href="listings.html?suburb=${encodeURIComponent(suburb)}&province=${encodeURIComponent(provinceName)}"
                class="area-item"
              >
                <span class="area-item__name">${suburb}</span>
                <span class="area-item__right">
                  <span class="area-item__count">${count}</span>
                  <span class="area-item__chevron">›</span>
                </span>
              </a>`).join('')}
          </div>`;
      } catch (err) {
        console.error('Firestore error:', err);
        content.innerHTML =
          '<p style="color:var(--text-muted);padding:var(--space-4)">Failed to load. Please refresh.</p>';
      }
    }

    init();
  </script>

</body>
</html>
