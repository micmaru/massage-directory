<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MassageMap — Find Massage Therapists in South Africa</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Hero ── */
    .hero {
      padding: var(--space-5) 0 var(--space-5);
    }

    /* ── Section header ── */
    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: var(--space-3);
    }

    /* ── Province grid ── */
    .province-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
    }

    .province-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--space-4) var(--space-4) var(--space-3);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 5px;
      cursor: pointer;
      font-family: var(--font-sans);
      text-align: left;
      transition: background var(--ease), border-color var(--ease), box-shadow var(--ease);
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }

    .province-card:hover {
      background: var(--bg-card-hover);
    }

    .province-card:active {
      transform: scale(0.97);
    }

    .province-card__name {
      font-size: var(--text-sm);
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    .province-card__count {
      font-size: var(--text-xs);
      color: var(--text-muted);
      line-height: 1;
    }

    /* ── Suburb rows (search results) ── */
    .suburb-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 12px var(--space-4);
      background: none;
      border: none;
      border-top: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      text-align: left;
      cursor: pointer;
      transition: background var(--ease);
      -webkit-tap-highlight-color: transparent;
    }

    .suburb-item:first-child {
      border-top: none;
    }

    .suburb-item:hover {
      background: var(--bg-card-hover);
    }

    .suburb-item:active {
      background: rgba(255, 255, 255, 0.04);
    }

    .suburb-item__name {
      font-weight: 500;
    }

    /* province badge shown in search results */
    .suburb-item__province {
      font-size: var(--text-xs);
      color: var(--text-muted);
      margin-top: 2px;
    }

    .suburb-item__right {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      flex-shrink: 0;
    }

    .suburb-item__count {
      font-size: var(--text-sm);
      color: var(--text-muted);
      min-width: 20px;
      text-align: right;
    }

    .suburb-item__chevron {
      color: var(--text-muted);
      font-size: 16px;
      opacity: 0.35;
      line-height: 1;
    }

    /* ── Search results container ── */
    .search-results-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    /* ── No results ── */
    .no-results {
      text-align: center;
      padding: var(--space-8) var(--space-4);
      color: var(--text-muted);
    }

    .no-results__icon {
      font-size: 2.25rem;
      margin-bottom: var(--space-3);
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════════
       Fixed Header
  ══════════════════════════════════════ -->
  <header class="header">
    <div class="header__logo">💆 <span>Massage</span>Map</div>
    <div class="header__actions">
      <button class="header__icon-btn" id="headerSearchBtn" aria-label="Focus search">🔍</button>
    </div>
  </header>


  <!-- ══════════════════════════════════════
       Main
  ══════════════════════════════════════ -->
  <main class="page">

    <!-- Search bar -->
    <section class="hero">
      <div class="input-wrapper">
        <span class="input-wrapper__icon">🔍</span>
        <input
          type="search"
          id="searchInput"
          class="input"
          placeholder="Search suburb or area..."
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        />
      </div>
    </section>

    <!-- Province grid (default view) -->
    <div id="gridSection">
      <div class="section-header">
        <span class="section-title" style="margin:0">Browse by Province</span>
        <span class="text-muted text-sm" id="totalSummary"></span>
      </div>
      <div class="province-grid" id="provinceGrid"></div>
    </div>

    <!-- Search results (shown when query is active) -->
    <div id="searchSection" class="hidden">
      <div class="section-header">
        <span class="section-title" style="margin:0">Results</span>
        <span class="text-muted text-sm" id="searchCount"></span>
      </div>
      <div class="search-results-card" id="searchResults"></div>
    </div>

    <!-- No results -->
    <div class="no-results hidden" id="noResults">
      <div class="no-results__icon">🔍</div>
      <p>No areas found</p>
      <p class="text-sm text-muted" style="margin-top:var(--space-2)">Try a different suburb name</p>
    </div>

  </main>


  <!-- ══════════════════════════════════════
       Bottom Navigation
  ══════════════════════════════════════ -->
  <nav class="bottom-nav" aria-label="Main navigation">
    <ul class="bottom-nav__list">
      <li class="bottom-nav__item">
        <button class="bottom-nav__link bottom-nav__link--active" aria-current="page">
          <span aria-hidden="true">🏠</span>
          <span>Home</span>
        </button>
      </li>
      <li class="bottom-nav__item">
        <button class="bottom-nav__link">
          <span aria-hidden="true">🗺️</span>
          <span>Map</span>
        </button>
      </li>
      <li class="bottom-nav__item">
        <button class="bottom-nav__link">
          <span aria-hidden="true">✍️</span>
          <span>Register</span>
        </button>
      </li>
      <li class="bottom-nav__item">
        <button class="bottom-nav__link">
          <span aria-hidden="true">⚙️</span>
          <span>Admin</span>
        </button>
      </li>
    </ul>
  </nav>


  <script type="module">
    import { db } from './firebase-config.js';
    import { collection, query, where, getDocs }
      from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

    /* ── Province display order (ID → display name) ───────── */
    const PROVINCE_ORDER = [
      { id: 'gauteng',       name: 'Gauteng'       },
      { id: 'western-cape',  name: 'Western Cape'  },
      { id: 'kwazulu-natal', name: 'KwaZulu-Natal' },
      { id: 'eastern-cape',  name: 'Eastern Cape'  },
      { id: 'free-state',    name: 'Free State'    },
      { id: 'north-west',    name: 'North West'    },
      { id: 'mpumalanga',    name: 'Mpumalanga'    },
      { id: 'limpopo',       name: 'Limpopo'       },
      { id: 'northern-cape', name: 'Northern Cape' },
    ];
    const PROVINCE_NAME = Object.fromEntries(PROVINCE_ORDER.map(p => [p.id, p.name]));

    /* ── DOM refs ─────────────────────────────────────────── */
    const grid         = document.getElementById('provinceGrid');
    const gridSection  = document.getElementById('gridSection');
    const searchSec    = document.getElementById('searchSection');
    const searchRes    = document.getElementById('searchResults');
    const noResults    = document.getElementById('noResults');
    const searchInput  = document.getElementById('searchInput');
    const totalSummary = document.getElementById('totalSummary');
    const searchCount  = document.getElementById('searchCount');

    /* ── State ────────────────────────────────────────────── */
    let provinceCounts = {};  // provinceId → count (all active incl. adult)
    let suburbIndex    = [];  // [{ suburb, provinceId, provinceName, count }] excl. adult

    /* ── Fetch all active suppliers ───────────────────────── */
    async function loadData() {
      grid.innerHTML =
        '<p style="color:var(--text-muted);font-size:var(--text-sm);padding:var(--space-4)">Loading…</p>';

      const snap = await getDocs(
        query(collection(db, 'suppliers'), where('status', '==', 'active'))
      );

      provinceCounts = {};
      const suburbMap = {}; // "suburb||provinceId" → { suburb, provinceId, count }

      snap.forEach(docSnap => {
        const d = docSnap.data();
        const pId = d.province || '';

        // Province count — all active including adult
        provinceCounts[pId] = (provinceCounts[pId] || 0) + 1;

        // Suburb index — exclude adult
        if (d.classification !== 'adult' && d.suburb) {
          const key = `${d.suburb}||${pId}`;
          if (!suburbMap[key]) suburbMap[key] = { suburb: d.suburb, provinceId: pId, count: 0 };
          suburbMap[key].count++;
        }
      });

      suburbIndex = Object.values(suburbMap).map(s => ({
        ...s,
        provinceName: PROVINCE_NAME[s.provinceId] || s.provinceId,
      }));

      buildGrid();
    }

    /* ── Build province grid ──────────────────────────────── */
    function buildGrid() {
      grid.innerHTML = '';

      const grandTotal = Object.values(provinceCounts).reduce((s, n) => s + n, 0);
      totalSummary.textContent = `${grandTotal.toLocaleString()} therapist${grandTotal !== 1 ? 's' : ''}`;

      PROVINCE_ORDER.forEach((province, idx) => {
        const count = provinceCounts[province.id] || 0;
        const card  = document.createElement('button');
        card.className  = 'province-card';
        card.dataset.idx = idx;
        card.innerHTML = `
          <span class="province-card__name">${province.name}</span>
          <span class="province-card__count">${count} therapist${count !== 1 ? 's' : ''}</span>`;
        grid.appendChild(card);
      });
    }

    /* ── Highlight matching text ──────────────────────────── */
    function highlight(text, q) {
      if (!q) return text;
      const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
      return text.replace(re, '<mark style="background:rgba(108,99,255,0.3);color:var(--text);border-radius:2px">$1</mark>');
    }

    /* ── Province card click → suburb screen ─────────────── */
    grid.addEventListener('click', e => {
      const card = e.target.closest('.province-card');
      if (!card) return;
      const province = PROVINCE_ORDER[parseInt(card.dataset.idx)];
      window.location.href = `suburb.html?province=${encodeURIComponent(province.name)}`;
    });

    /* ── Search ───────────────────────────────────────────── */
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim().toLowerCase();

      if (!q) {
        gridSection.classList.remove('hidden');
        searchSec.classList.add('hidden');
        noResults.classList.add('hidden');
        return;
      }

      gridSection.classList.add('hidden');
      searchSec.classList.remove('hidden');

      const matches = suburbIndex.filter(s =>
        s.suburb.toLowerCase().includes(q) || s.provinceName.toLowerCase().includes(q)
      );

      if (matches.length === 0) {
        searchRes.innerHTML = '';
        noResults.classList.remove('hidden');
        searchCount.textContent = '0 found';
        return;
      }

      noResults.classList.add('hidden');
      searchCount.textContent = `${matches.length} area${matches.length !== 1 ? 's' : ''}`;

      searchRes.innerHTML = matches.map(m => `
        <button class="suburb-item" data-suburb="${m.suburb}" data-province="${m.provinceName}">
          <span>
            <span class="suburb-item__name">${highlight(m.suburb, q)}</span>
            <div class="suburb-item__province">${m.provinceName}</div>
          </span>
          <span class="suburb-item__right">
            <span class="suburb-item__count">${m.count}</span>
            <span class="suburb-item__chevron">›</span>
          </span>
        </button>`).join('');
    });

    /* ── Search result click → listings ──────────────────── */
    document.addEventListener('click', e => {
      const btn = e.target.closest('.suburb-item');
      if (!btn) return;
      window.location.href =
        `listings.html?suburb=${encodeURIComponent(btn.dataset.suburb)}&province=${encodeURIComponent(btn.dataset.province)}`;
    });

    /* ── Header search button ─────────────────────────────── */
    document.getElementById('headerSearchBtn').addEventListener('click', () => {
      searchInput.focus();
      searchInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });

    /* ── Init ─────────────────────────────────────────────── */
    loadData().catch(err => {
      console.error('Firestore error:', err);
      grid.innerHTML =
        '<p style="color:var(--text-muted);padding:var(--space-4)">Failed to load data. Please refresh.</p>';
    });
  </script>

</body>
</html>
