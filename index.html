<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MassageMap — Find Massage Therapists in South Africa</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Hero ── */
    .hero {
      padding: var(--space-5) 0 var(--space-5);
    }

    /* ── Section header ── */
    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: var(--space-3);
    }

    /* ── Province grid ── */
    .province-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
    }

    .province-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--space-4) var(--space-4) var(--space-3);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 5px;
      cursor: pointer;
      font-family: var(--font-sans);
      text-align: left;
      transition: background var(--ease), border-color var(--ease), box-shadow var(--ease);
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }

    .province-card:hover {
      background: var(--bg-card-hover);
    }

    .province-card:active {
      transform: scale(0.97);
    }

    .province-card__name {
      font-size: var(--text-sm);
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    .province-card__count {
      font-size: var(--text-xs);
      color: var(--text-muted);
      line-height: 1;
    }

    /* ── Suburb rows (search results) ── */
    .suburb-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 12px var(--space-4);
      background: none;
      border: none;
      border-top: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      text-align: left;
      cursor: pointer;
      transition: background var(--ease);
      -webkit-tap-highlight-color: transparent;
    }

    .suburb-item:first-child {
      border-top: none;
    }

    .suburb-item:hover {
      background: var(--bg-card-hover);
    }

    .suburb-item:active {
      background: rgba(255, 255, 255, 0.04);
    }

    .suburb-item__name {
      font-weight: 500;
    }

    /* province badge shown in search results */
    .suburb-item__province {
      font-size: var(--text-xs);
      color: var(--text-muted);
      margin-top: 2px;
    }

    .suburb-item__right {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      flex-shrink: 0;
    }

    .suburb-item__count {
      font-size: var(--text-sm);
      color: var(--text-muted);
      min-width: 20px;
      text-align: right;
    }

    .suburb-item__chevron {
      color: var(--text-muted);
      font-size: 16px;
      opacity: 0.35;
      line-height: 1;
    }

    /* ── Search results container ── */
    .search-results-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    /* ── No results ── */
    .no-results {
      text-align: center;
      padding: var(--space-8) var(--space-4);
      color: var(--text-muted);
    }

    .no-results__icon {
      font-size: 2.25rem;
      margin-bottom: var(--space-3);
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════════
       Fixed Header
  ══════════════════════════════════════ -->
  <header class="header">
    <div class="header__logo">💆 <span>Massage</span>Map</div>
    <div class="header__actions">
      <button class="header__icon-btn" id="headerSearchBtn" aria-label="Focus search">🔍</button>
    </div>
  </header>


  <!-- ══════════════════════════════════════
       Main
  ══════════════════════════════════════ -->
  <main class="page">

    <!-- Search bar -->
    <section class="hero">
      <div class="input-wrapper">
        <span class="input-wrapper__icon">🔍</span>
        <input
          type="search"
          id="searchInput"
          class="input"
          placeholder="Search suburb or area..."
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        />
      </div>
    </section>

    <!-- Province grid (default view) -->
    <div id="gridSection">
      <div class="section-header">
        <span class="section-title" style="margin:0">Browse by Province</span>
        <span class="text-muted text-sm" id="totalSummary"></span>
      </div>
      <div class="province-grid" id="provinceGrid"></div>
    </div>

    <!-- Search results (shown when query is active) -->
    <div id="searchSection" class="hidden">
      <div class="section-header">
        <span class="section-title" style="margin:0">Results</span>
        <span class="text-muted text-sm" id="searchCount"></span>
      </div>
      <div class="search-results-card" id="searchResults"></div>
    </div>

    <!-- No results -->
    <div class="no-results hidden" id="noResults">
      <div class="no-results__icon">🔍</div>
      <p>No areas found</p>
      <p class="text-sm text-muted" style="margin-top:var(--space-2)">Try a different suburb name</p>
    </div>

  </main>


  <!-- ══════════════════════════════════════
       Bottom Navigation
  ══════════════════════════════════════ -->
  <nav class="bottom-nav" aria-label="Main navigation">
    <ul class="bottom-nav__list">
      <li class="bottom-nav__item">
        <button class="bottom-nav__link bottom-nav__link--active" aria-current="page">
          <span aria-hidden="true">🏠</span>
          <span>Home</span>
        </button>
      </li>
      <li class="bottom-nav__item">
        <button class="bottom-nav__link">
          <span aria-hidden="true">🗺️</span>
          <span>Map</span>
        </button>
      </li>
      <li class="bottom-nav__item">
        <button class="bottom-nav__link">
          <span aria-hidden="true">✍️</span>
          <span>Register</span>
        </button>
      </li>
      <li class="bottom-nav__item">
        <button class="bottom-nav__link">
          <span aria-hidden="true">⚙️</span>
          <span>Admin</span>
        </button>
      </li>
    </ul>
  </nav>


  <script>
    /* ── Data ─────────────────────────────────────────────── */
    const PROVINCES = [
      {
        name: 'Gauteng',
        suburbs: [
          { name: 'Sandton',       count: 12 },
          { name: 'Rosebank',      count: 8  },
          { name: 'Fourways',      count: 15 },
          { name: 'Midrand',       count: 9  },
          { name: 'Bryanston',     count: 11 },
          { name: 'Melville',      count: 6  },
          { name: 'Randburg',      count: 14 },
          { name: 'Centurion',     count: 18 },
          { name: 'Boksburg',      count: 7  },
          { name: 'Germiston',     count: 5  },
          { name: 'Pretoria East', count: 22 },
          { name: 'Hatfield',      count: 10 },
          { name: 'Brooklyn',      count: 9  },
          { name: 'Soweto',        count: 4  },
          { name: 'Edenvale',      count: 6  },
        ],
      },
      {
        name: 'Western Cape',
        suburbs: [
          { name: 'Cape Town CBD', count: 19 },
          { name: 'Sea Point',     count: 14 },
          { name: 'Camps Bay',     count: 11 },
          { name: 'Claremont',     count: 9  },
          { name: 'Stellenbosch',  count: 8  },
          { name: 'Paarl',         count: 5  },
          { name: 'George',        count: 6  },
        ],
      },
      {
        name: 'KwaZulu-Natal',
        suburbs: [
          { name: 'Umhlanga',      count: 16 },
          { name: 'Durban CBD',    count: 13 },
          { name: 'Berea',         count: 8  },
          { name: 'Westville',     count: 7  },
          { name: 'Pinetown',      count: 5  },
          { name: 'Ballito',       count: 9  },
        ],
      },
      {
        name: 'Eastern Cape',
        suburbs: [
          { name: 'Port Elizabeth', count: 11 },
          { name: 'East London',    count: 8  },
          { name: 'Summerstrand',   count: 6  },
          { name: 'Greenacres',     count: 4  },
        ],
      },
      {
        name: 'Free State',
        suburbs: [
          { name: 'Bloemfontein',    count: 9 },
          { name: 'Welkom',          count: 3 },
          { name: 'Langenhovenpark', count: 4 },
        ],
      },
      {
        name: 'North West',
        suburbs: [
          { name: 'Rustenburg',    count: 7 },
          { name: 'Potchefstroom', count: 5 },
          { name: 'Klerksdorp',    count: 4 },
        ],
      },
      {
        name: 'Mpumalanga',
        suburbs: [
          { name: 'Nelspruit',   count: 6 },
          { name: 'Witbank',     count: 4 },
          { name: 'White River', count: 3 },
        ],
      },
      {
        name: 'Limpopo',
        suburbs: [
          { name: 'Polokwane',  count: 5 },
          { name: 'Tzaneen',    count: 3 },
          { name: 'Phalaborwa', count: 2 },
        ],
      },
      {
        name: 'Northern Cape',
        suburbs: [
          { name: 'Kimberley', count: 5 },
          { name: 'Upington',  count: 3 },
        ],
      },
    ];

    // Compute totals once
    PROVINCES.forEach(p => {
      p.total = p.suburbs.reduce((s, sub) => s + sub.count, 0);
    });

    /* ── DOM refs ─────────────────────────────────────────── */
    const grid         = document.getElementById('provinceGrid');
    const gridSection  = document.getElementById('gridSection');
    const searchSec    = document.getElementById('searchSection');
    const searchRes    = document.getElementById('searchResults');
    const noResults    = document.getElementById('noResults');
    const searchInput  = document.getElementById('searchInput');
    const totalSummary = document.getElementById('totalSummary');
    const searchCount  = document.getElementById('searchCount');

    /* ── Build province grid ──────────────────────────────── */
    function buildGrid() {
      grid.innerHTML = '';

      const grandTotal = PROVINCES.reduce((s, p) => s + p.total, 0);
      totalSummary.textContent = `${grandTotal.toLocaleString()} therapists`;

      PROVINCES.forEach((province, idx) => {
        const card = document.createElement('button');
        card.className = 'province-card';
        card.dataset.idx = idx;
        card.innerHTML = `
          <span class="province-card__name">${province.name}</span>
          <span class="province-card__count">${province.total} therapists</span>`;
        grid.appendChild(card);
      });
    }

    /* ── highlight matching text in search ───────────────── */
    function highlight(text, query) {
      if (!query) return text;
      const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
      return text.replace(re, '<mark style="background:rgba(108,99,255,0.3);color:var(--text);border-radius:2px">$1</mark>');
    }

    /* ── Province card click → navigate to suburb screen ─── */
    grid.addEventListener('click', e => {
      const card = e.target.closest('.province-card');
      if (!card) return;
      const province = PROVINCES[parseInt(card.dataset.idx)];
      window.location.href = `suburb.html?province=${encodeURIComponent(province.name)}`;
    });

    /* ── Search ───────────────────────────────────────────── */
    searchInput.addEventListener('input', () => {
      const query = searchInput.value.trim().toLowerCase();

      if (!query) {
        // Back to grid view
        gridSection.classList.remove('hidden');
        searchSec.classList.add('hidden');
        noResults.classList.add('hidden');
        return;
      }

      // Show search section, hide grid
      gridSection.classList.add('hidden');
      searchSec.classList.remove('hidden');

      // Collect matching suburbs across all provinces
      const matches = [];
      PROVINCES.forEach(p => {
        p.suburbs.forEach(s => {
          if (s.name.toLowerCase().includes(query) || p.name.toLowerCase().includes(query)) {
            matches.push({ suburb: s, province: p.name });
          }
        });
      });

      if (matches.length === 0) {
        searchRes.innerHTML = '';
        noResults.classList.remove('hidden');
        searchCount.textContent = '0 found';
        return;
      }

      noResults.classList.add('hidden');
      searchCount.textContent = `${matches.length} area${matches.length !== 1 ? 's' : ''}`;

      searchRes.innerHTML = matches.map(m => `
        <button class="suburb-item" data-suburb="${m.suburb.name}" data-province="${m.province}">
          <span>
            <span class="suburb-item__name">${highlight(m.suburb.name, query)}</span>
            <div class="suburb-item__province">${m.province}</div>
          </span>
          <span class="suburb-item__right">
            <span class="suburb-item__count">${m.suburb.count}</span>
            <span class="suburb-item__chevron">›</span>
          </span>
        </button>`).join('');
    });

    /* ── Search suburb click → navigate to listings ────────── */
    document.addEventListener('click', e => {
      const btn = e.target.closest('.suburb-item');
      if (!btn) return;
      const suburb   = btn.dataset.suburb;
      const province = btn.dataset.province;
      window.location.href =
        `listings.html?suburb=${encodeURIComponent(suburb)}&province=${encodeURIComponent(province)}`;
    });

    /* ── Header search button ─────────────────────────────── */
    document.getElementById('headerSearchBtn').addEventListener('click', () => {
      searchInput.focus();
      searchInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });

    /* ── Init ─────────────────────────────────────────────── */
    buildGrid();
  </script>

</body>
</html>
