<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MassageMap — Map View</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Hamburger button ── */
    .header__hamburger {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: none;
      background: none;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background var(--ease);
      -webkit-tap-highlight-color: transparent;
    }
    .header__hamburger:hover { background: var(--bg-card-hover); }
    .header__hamburger:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* ── Home brand (absolute-centred inside fixed header) ── */
    .header__home-brand {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: var(--text-lg);
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
      white-space: nowrap;
      pointer-events: none;
    }

    /* ── Drawer backdrop ── */
    .drawer-backdrop {
      position: fixed;
      inset: 0;
      z-index: 150;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.25s ease, visibility 0.25s ease;
    }
    .drawer-backdrop--open {
      opacity: 1;
      visibility: visible;
    }

    /* ── Drawer panel ── */
    .drawer {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 200;
      width: 280px;
      max-width: 82vw;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .drawer--open { transform: translateX(0); }

    .drawer__head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--space-4);
      height: var(--header-h);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .drawer__brand {
      font-size: var(--text-lg);
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
    }
    .drawer__close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.06);
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--ease), color var(--ease);
      -webkit-tap-highlight-color: transparent;
    }
    .drawer__close:hover { background: rgba(255,255,255,0.12); color: var(--text); }
    .drawer__close:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    .drawer__nav { padding: var(--space-3) 0; }
    .drawer__link {
      display: flex;
      align-items: center;
      padding: 15px var(--space-5);
      color: var(--text);
      font-size: var(--text-base);
      font-weight: 500;
      text-decoration: none;
      border-left: 3px solid transparent;
      transition: background var(--ease), border-color var(--ease);
      -webkit-tap-highlight-color: transparent;
    }
    .drawer__link:hover {
      background: var(--bg-card-hover);
      border-left-color: var(--accent);
      color: var(--text);
    }
    .drawer__link--active {
      background: var(--bg-card-hover);
      border-left-color: var(--accent);
      color: var(--accent-light);
    }

    /* Ensure [hidden] attribute always wins over any display set by class CSS */
    [hidden] { display: none !important; }

    /* ── Loading spinner (shown while GPS resolves) ── */
    .map-loading {
      position: fixed;
      top: var(--header-h);
      left: 0;
      right: 0;
      bottom: calc(var(--nav-h) + env(safe-area-inset-bottom, 0px));
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── GPS error state ── */
    .gps-error {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-5);
      min-height: calc(100dvh - var(--header-h) - var(--nav-h) - env(safe-area-inset-bottom, 0px));
      padding: var(--space-6) var(--space-4);
      text-align: center;
    }
    .gps-error__icon { font-size: 3rem; line-height: 1; }
    .gps-error__msg {
      font-size: var(--text-base);
      color: var(--text-muted);
      max-width: 260px;
      line-height: 1.6;
    }
    .gps-error__btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px var(--space-6);
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-size: var(--text-base);
      font-weight: 600;
      text-decoration: none;
      transition: opacity var(--ease);
      -webkit-tap-highlight-color: transparent;
    }
    .gps-error__btn:hover { opacity: 0.88; }

    /* ── Map container fills space between header and bottom nav ── */
    .map-wrap {
      position: fixed;
      top: var(--header-h);
      left: 0;
      right: 0;
      bottom: calc(var(--nav-h) + env(safe-area-inset-bottom, 0px));
      z-index: 0;
    }
    #map { width: 100%; height: 100%; }

    /* ── Pin legend bar (fixed above bottom nav) ── */
    .map-legend {
      position: fixed;
      bottom: calc(var(--nav-h) + env(safe-area-inset-bottom, 0px));
      left: 0;
      right: 0;
      height: 40px;
      z-index: 50;
      background: rgba(13, 17, 23, 0.88);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid rgba(255, 255, 255, 0.07);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 36px;
    }
    .map-legend__item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
      user-select: none;
    }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════════
       Drawer backdrop
  ══════════════════════════════════════ -->
  <div id="drawerBackdrop" class="drawer-backdrop" aria-hidden="true"></div>


  <!-- ══════════════════════════════════════
       Hamburger drawer
  ══════════════════════════════════════ -->
  <nav id="drawer" class="drawer" aria-label="Site navigation" aria-hidden="true">
    <div class="drawer__head">
      <span class="drawer__brand">
        <span style="color:var(--accent)">Massage</span>Map
      </span>
      <button id="drawerClose" class="drawer__close" aria-label="Close menu">✕</button>
    </div>
    <div class="drawer__nav">
      <a href="suburb.html?type=individual"   class="drawer__link">Find a therapist</a>
      <a href="suburb.html?type=spa"          class="drawer__link">Find a spa</a>
      <a href="map.html"                      class="drawer__link drawer__link--active">Map view</a>
      <a href="register.html?type=individual" class="drawer__link">Therapist — Register or Login</a>
      <a href="register.html?type=spa"        class="drawer__link">Spa — Register or Login</a>
      <a href="about.html"                    class="drawer__link">About MassageMap</a>
    </div>
  </nav>


  <!-- ══════════════════════════════════════
       Fixed Header
  ══════════════════════════════════════ -->
  <header class="header">
    <button
      id="burgerBtn"
      class="header__hamburger"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="drawer"
    >
      <svg width="18" height="14" viewBox="0 0 18 14" fill="none" aria-hidden="true">
        <path d="M1 1h16M1 7h16M1 13h16"
              stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
      </svg>
    </button>
    <span class="header__home-brand" aria-hidden="true">
      <span style="color:var(--accent)">Massage</span>Map
    </span>
    <div style="width:36px" aria-hidden="true"></div>
  </header>


  <!-- ══════════════════════════════════════
       Loading (GPS pending)
  ══════════════════════════════════════ -->
  <div id="mapLoading" class="map-loading" aria-live="polite" aria-label="Requesting location…">
    <div class="spinner"></div>
  </div>


  <!-- ══════════════════════════════════════
       GPS denied / unavailable
  ══════════════════════════════════════ -->
  <div id="gpsError" class="gps-error" hidden>
    <div class="gps-error__icon">📍</div>
    <p class="gps-error__msg">Your location cannot be determined</p>
    <a href="index.html" class="gps-error__btn">Return to main menu</a>
  </div>


  <!-- ══════════════════════════════════════
       Map canvas (shown after GPS granted)
  ══════════════════════════════════════ -->
  <div id="mapWrap" class="map-wrap">
    <div id="map"></div>
  </div>


  <!-- ══════════════════════════════════════
       Pin legend bar
  ══════════════════════════════════════ -->
  <div class="map-legend" aria-label="Map legend">
    <div class="map-legend__item">
      <svg width="16" height="21" viewBox="0 0 32 42" fill="none" aria-hidden="true">
        <path d="M16,42 C10,35 1,27 1,16 A15,15 0 1 1 31,16 C31,27 22,35 16,42Z" fill="#E24B4A" stroke="rgba(0,0,0,0.25)" stroke-width="1"/>
        <text x="16" y="21" font-family="system-ui,Arial,sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="middle">T</text>
      </svg>
      <span>Therapist</span>
    </div>
    <div class="map-legend__item">
      <svg width="16" height="21" viewBox="0 0 32 42" fill="none" aria-hidden="true">
        <path d="M16,42 C10,35 1,27 1,16 A15,15 0 1 1 31,16 C31,27 22,35 16,42Z" fill="#EF9F27" stroke="rgba(0,0,0,0.25)" stroke-width="1"/>
        <text x="16" y="21" font-family="system-ui,Arial,sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="middle">S</text>
      </svg>
      <span>Spa</span>
    </div>
  </div>


  <!-- ══════════════════════════════════════
       Bottom Navigation
  ══════════════════════════════════════ -->
  <nav class="bottom-nav" aria-label="Main navigation">
    <ul class="bottom-nav__list">
      <li class="bottom-nav__item">
        <a href="index.html" class="bottom-nav__link">
          <span aria-hidden="true">🏠</span>
          <span>Home</span>
        </a>
      </li>
      <li class="bottom-nav__item">
        <button class="bottom-nav__link bottom-nav__link--active" aria-current="page">
          <span aria-hidden="true">🗺️</span>
          <span>Map</span>
        </button>
      </li>
      <li class="bottom-nav__item">
        <a href="register.html" class="bottom-nav__link">
          <span aria-hidden="true">✍️</span>
          <span>Register</span>
        </a>
      </li>
      <li class="bottom-nav__item">
        <a href="dashboard.html" class="bottom-nav__link">
          <span aria-hidden="true">⚙️</span>
          <span>Admin</span>
        </a>
      </li>
    </ul>
  </nav>


  <script type="module">
    import { db } from './firebase-config.js';
    import {
      collection, getDocs, query, where
    } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

    /* ── Hamburger ───────────────────────────────────────────── */
    const burgerBtn      = document.getElementById('burgerBtn');
    const drawer         = document.getElementById('drawer');
    const drawerBackdrop = document.getElementById('drawerBackdrop');
    const drawerClose    = document.getElementById('drawerClose');

    function openDrawer() {
      drawer.classList.add('drawer--open');
      drawer.setAttribute('aria-hidden', 'false');
      drawerBackdrop.classList.add('drawer-backdrop--open');
      burgerBtn.setAttribute('aria-expanded', 'true');
      document.body.style.overflow = 'hidden';
    }
    function closeDrawer() {
      drawer.classList.remove('drawer--open');
      drawer.setAttribute('aria-hidden', 'true');
      drawerBackdrop.classList.remove('drawer-backdrop--open');
      burgerBtn.setAttribute('aria-expanded', 'false');
      document.body.style.overflow = '';
    }
    burgerBtn.addEventListener('click', openDrawer);
    drawerClose.addEventListener('click', closeDrawer);
    drawerBackdrop.addEventListener('click', closeDrawer);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

    /* ── DOM refs ────────────────────────────────────────────── */
    const mapLoading = document.getElementById('mapLoading');
    const gpsError   = document.getElementById('gpsError');
    const mapWrap    = document.getElementById('mapWrap');

    /* ── Teardrop pin icon ───────────────────────────────────── */
    function pinIcon(color, letter) {
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="42" viewBox="0 0 32 42"><path d="M16,42 C10,35 1,27 1,16 A15,15 0 1 1 31,16 C31,27 22,35 16,42Z" fill="${color}" stroke="rgba(0,0,0,0.28)" stroke-width="1"/><text x="16" y="21" font-family="system-ui,Arial,sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="middle">${letter}</text></svg>`;
      return {
        url: 'data:image/svg+xml,' + encodeURIComponent(svg),
        scaledSize: new google.maps.Size(32, 42),
        anchor:     new google.maps.Point(16, 42),
      };
    }

    /* ── Maps API loader (injected only after GPS confirmed) ─── */
    function loadMapsAPI(key) {
      return new Promise((resolve, reject) => {
        window.__mapsCb = resolve;
        const s = document.createElement('script');
        s.src = `https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(key)}&callback=__mapsCb`;
        s.async = true;
        s.onerror = () => reject(new Error('Maps API failed to load'));
        document.head.appendChild(s);
      });
    }

    /* ── Map init ────────────────────────────────────────────── */
    async function initMap(lat, lng) {
      await loadMapsAPI(window.GOOGLE_MAPS_API_KEY || '');

      mapLoading.hidden = true;

      const map = new google.maps.Map(document.getElementById('map'), {
        center: { lat, lng },
        zoom: 13,
        mapTypeControl: false,
        streetViewControl: false,
        fullscreenControl: false,
        zoomControlOptions: {
          position: google.maps.ControlPosition.RIGHT_CENTER,
        },
        styles: [
          /* ── Base geometry ── */
          { elementType: 'geometry',           stylers: [{ color: '#1a1f2e' }] },
          { elementType: 'labels.text.stroke', stylers: [{ color: '#0d1117' }] },
          { elementType: 'labels.text.fill',   stylers: [{ color: '#6b7280' }] },

          /* ── Administrative (country / province / city names) ── */
          { featureType: 'administrative',
            elementType: 'geometry', stylers: [{ visibility: 'off' }] },
          { featureType: 'administrative.country',
            elementType: 'labels.text.fill', stylers: [{ color: '#9ca3af' }] },
          { featureType: 'administrative.province',
            elementType: 'labels.text.fill', stylers: [{ color: '#6b7280' }] },
          { featureType: 'administrative.locality',
            elementType: 'labels.text.fill', stylers: [{ color: '#94a3b8' }] },
          { featureType: 'administrative.neighborhood',
            elementType: 'labels',           stylers: [{ visibility: 'off' }] },

          /* ── Water ── */
          { featureType: 'water',
            elementType: 'geometry', stylers: [{ color: '#0d1117' }] },
          { featureType: 'water',
            elementType: 'labels.text.fill', stylers: [{ color: '#374151' }] },

          /* ── Landscape / terrain ── */
          { featureType: 'landscape',
            elementType: 'geometry', stylers: [{ color: '#1e2435' }] },
          { featureType: 'landscape.natural',
            elementType: 'geometry', stylers: [{ color: '#181e2d' }] },

          /* ── POI — hide completely ── */
          { featureType: 'poi',     stylers: [{ visibility: 'off' }] },
          { featureType: 'poi.park',
            elementType: 'geometry', stylers: [{ color: '#1a2232' }, { visibility: 'on' }] },
          { featureType: 'poi.park',
            elementType: 'labels',   stylers: [{ visibility: 'off' }] },

          /* ── Transit — hide completely ── */
          { featureType: 'transit', stylers: [{ visibility: 'off' }] },

          /* ── Roads — muted grey tones, no shields ── */
          { featureType: 'road',
            elementType: 'geometry',           stylers: [{ color: '#242c3d' }] },
          { featureType: 'road',
            elementType: 'geometry.stroke',    stylers: [{ color: '#1a2030' }] },
          { featureType: 'road',
            elementType: 'labels.icon',        stylers: [{ visibility: 'off' }] },
          { featureType: 'road',
            elementType: 'labels.text.fill',   stylers: [{ color: '#4b5563' }] },
          { featureType: 'road',
            elementType: 'labels.text.stroke', stylers: [{ color: '#0d1117' }] },

          /* Arterial roads — slightly lighter so the grid reads */
          { featureType: 'road.arterial',
            elementType: 'geometry',           stylers: [{ color: '#2e3a50' }] },
          { featureType: 'road.arterial',
            elementType: 'labels.text.fill',   stylers: [{ color: '#556070' }] },
          { featureType: 'road.arterial',
            elementType: 'labels.icon',        stylers: [{ visibility: 'off' }] },

          /* Highways — still slightly visible but stripped of shields */
          { featureType: 'road.highway',
            elementType: 'geometry',           stylers: [{ color: '#354055' }] },
          { featureType: 'road.highway',
            elementType: 'geometry.stroke',    stylers: [{ color: '#1a2030' }] },
          { featureType: 'road.highway',
            elementType: 'labels.icon',        stylers: [{ visibility: 'off' }] },
          { featureType: 'road.highway',
            elementType: 'labels.text.fill',   stylers: [{ color: '#4b5563' }] },
          { featureType: 'road.highway.controlled_access',
            elementType: 'geometry',           stylers: [{ color: '#2e3a50' }] },
          { featureType: 'road.highway.controlled_access',
            elementType: 'labels.icon',        stylers: [{ visibility: 'off' }] },

          /* Local roads — very subtle */
          { featureType: 'road.local',
            elementType: 'geometry',           stylers: [{ color: '#1e2738' }] },
          { featureType: 'road.local',
            elementType: 'labels',             stylers: [{ visibility: 'off' }] },
        ],
      });

      google.maps.event.trigger(map, 'resize');

      /* Load all active suppliers */
      try {
        const snap = await getDocs(
          query(collection(db, 'suppliers'), where('status', '==', 'active'))
        );

        snap.forEach(docSnap => {
          const d = { id: docSnap.id, ...docSnap.data() };

          const pinLat = typeof d.gpsLat === 'number' ? d.gpsLat : parseFloat(d.gpsLat);
          const pinLng = typeof d.gpsLng === 'number' ? d.gpsLng : parseFloat(d.gpsLng);
          if (!d.gpsLat || !d.gpsLng || isNaN(pinLat) || isNaN(pinLng)) return;

          const isSpa  = d.supplierType === 'spa';
          const marker = new google.maps.Marker({
            position: { lat: pinLat, lng: pinLng },
            map,
            title: d.displayName || '',
            icon:  pinIcon(isSpa ? '#EF9F27' : '#E24B4A', isSpa ? 'S' : 'T'),
          });

          marker.addListener('click', () => {
            window.location.href = `profile.html?id=${encodeURIComponent(d.id)}&type=${encodeURIComponent(d.supplierType || '')}&source=map`;
          });
        });
      } catch (err) {
        console.error('Firestore error:', err);
      }
    }

    /* ── GPS request ─────────────────────────────────────────── */
    if (!navigator.geolocation) {
      mapLoading.hidden = true;
      gpsError.hidden   = false;
    } else {
      navigator.geolocation.getCurrentPosition(
        pos => {
          initMap(pos.coords.latitude, pos.coords.longitude).catch(() => {
            mapLoading.hidden = true;
            gpsError.hidden   = false;
            mapWrap.hidden    = true;
          });
        },
        () => {
          mapLoading.hidden = true;
          gpsError.hidden   = false;
          mapWrap.hidden    = true;
        },
        { timeout: 10000, maximumAge: 60000 }
      );
    }
  </script>

</body>
</html>
