<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MassageMap</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Inner page header ── */
    .header {
      position: relative;
    }

    .header__back {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--accent-light);
      font-size: var(--text-sm);
      font-weight: 500;
      text-decoration: none;
      min-width: 72px;
      padding: var(--space-2);
      margin: calc(-1 * var(--space-2));
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      transition: color var(--ease);
    }

    .header__back:hover { color: var(--text); }

    .header__page-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: var(--text-base);
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
      pointer-events: none;
      margin: 0;
    }

    /* ── Section header ── */
    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding-top: var(--space-2);
      margin-bottom: var(--space-4);
    }

    /* ── Listing table ── */
    .listing-table {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    /* Column grid:  name | type-badge | service | chevron */
    .listing-col-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 68px 74px 14px;
      align-items: center;
      gap: var(--space-2);
    }

    /* Column header row */
    .listing-col-header {
      padding: var(--space-2) var(--space-4);
      border-bottom: 1px solid var(--border);
      background: rgba(15, 17, 23, 0.5);
    }

    .listing-col-header span {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text-muted);
    }

    /* Last two header labels right-aligned */
    .listing-col-header span:nth-child(2),
    .listing-col-header span:nth-child(3) {
      text-align: center;
    }

    /* Data row */
    .listing-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 68px 74px 14px;
      align-items: center;
      gap: var(--space-2);
      padding: 13px var(--space-4);
      border-top: 1px solid var(--border);
      text-decoration: none;
      color: var(--text);
      transition: background var(--ease);
      -webkit-tap-highlight-color: transparent;
    }

    .listing-row:hover  { background: var(--bg-card-hover); }
    .listing-row:active { background: rgba(255, 255, 255, 0.04); }

    .listing-row__name {
      font-size: var(--text-sm);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Centre badge columns */
    .listing-row__type,
    .listing-row__service {
      display: flex;
      justify-content: center;
    }

    /* override badge sizing for compact table context */
    .listing-row__type .badge,
    .listing-row__service .badge {
      font-size: 10px;
      height: 20px;
      padding: 0 6px;
      white-space: nowrap;
    }

    /* service uses a neutral chip style */
    .badge--service {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
      border-color: var(--border);
    }

    .listing-row__chevron {
      font-size: 16px;
      color: var(--text-muted);
      opacity: 0.35;
      text-align: right;
    }

    /* ── Empty / error state ── */
    .empty-state {
      text-align: center;
      padding: var(--space-8) var(--space-4);
      color: var(--text-muted);
    }

    .empty-state__icon {
      font-size: 2.5rem;
      margin-bottom: var(--space-3);
    }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════════
       Fixed Header
  ══════════════════════════════════════ -->
  <header class="header">
    <a id="backBtn" href="index.html" class="header__back">‹ Back</a>
    <h1 class="header__page-title" id="pageTitle">Suburb</h1>
    <div style="min-width:72px"></div>
  </header>


  <!-- ══════════════════════════════════════
       Main Content
  ══════════════════════════════════════ -->
  <main class="page">

    <div class="section-header">
      <span class="section-title" style="margin:0">Therapists</span>
      <span class="text-muted text-sm" id="summary"></span>
    </div>

    <div id="content"></div>

  </main>


  <!-- ══════════════════════════════════════
       Bottom Navigation
  ══════════════════════════════════════ -->
  <nav class="bottom-nav" aria-label="Main navigation">
    <ul class="bottom-nav__list">
      <li class="bottom-nav__item">
        <a href="index.html" class="bottom-nav__link">
          <span aria-hidden="true">🏠</span>
          <span>Home</span>
        </a>
      </li>
      <li class="bottom-nav__item">
        <button class="bottom-nav__link">
          <span aria-hidden="true">🗺️</span>
          <span>Map</span>
        </button>
      </li>
      <li class="bottom-nav__item">
        <button class="bottom-nav__link">
          <span aria-hidden="true">✍️</span>
          <span>Register</span>
        </button>
      </li>
      <li class="bottom-nav__item">
        <button class="bottom-nav__link">
          <span aria-hidden="true">⚙️</span>
          <span>Admin</span>
        </button>
      </li>
    </ul>
  </nav>


  <script>
    /* ── URL params ───────────────────────────────────────── */
    const params     = new URLSearchParams(window.location.search);
    const suburb     = params.get('suburb')   || '';
    const province   = params.get('province') || '';

    /* ── Back button ──────────────────────────────────────── */
    document.getElementById('backBtn').href = province
      ? `suburb.html?province=${encodeURIComponent(province)}`
      : 'index.html';

    /* ── Page title ───────────────────────────────────────── */
    document.title = suburb ? `${suburb} — MassageMap` : 'MassageMap';
    document.getElementById('pageTitle').textContent = suburb || 'Therapists';

    /* ── Dummy therapist data ─────────────────────────────── */
    // In production this would be a Firestore query filtered by suburb.
    const THERAPISTS = [
      { id: 1,  name: 'Zanele Dlamini',       type: 'massage',  service: 'Swedish'      },
      { id: 2,  name: 'Priya Naidoo',          type: 'holistic', service: 'Reiki'        },
      { id: 3,  name: 'Annika van der Berg',   type: 'massage',  service: 'Sports'       },
      { id: 4,  name: 'Thabo Mokoena',         type: 'massage',  service: 'Deep Tissue'  },
      { id: 5,  name: 'Sarah Mitchell',        type: 'holistic', service: 'Aromatherapy' },
      { id: 7,  name: 'David Nkosi',           type: 'massage',  service: 'Remedial'     },
      { id: 8,  name: 'Fatima Patel',          type: 'holistic', service: 'Reflexology'  },
      { id: 9,  name: 'Jacques du Toit',       type: 'massage',  service: 'Trigger Point'},
      { id: 10, name: 'Nomsa Dube',            type: 'holistic', service: 'Lymphatic'    },
    ];

    const TYPE_BADGE = {
      massage:  'badge--massage',
      holistic: 'badge--holistic',
      adult:    'badge--adult',
    };

    const TYPE_LABEL = {
      massage:  'Massage',
      holistic: 'Holistic',
      adult:    'Adult',
    };

    /* ── Render ───────────────────────────────────────────── */
    const content = document.getElementById('content');
    const summary = document.getElementById('summary');

    if (!suburb) {
      content.innerHTML = `
        <div class="empty-state">
          <div class="empty-state__icon">🔍</div>
          <p>No suburb specified</p>
          <p class="text-sm text-muted" style="margin-top:var(--space-2)">
            <a href="index.html">← Back to home</a>
          </p>
        </div>`;
    } else {
      summary.textContent = `${THERAPISTS.length} therapists`;

      content.innerHTML = `
        <div class="listing-table">

          <!-- Column headers -->
          <div class="listing-col-header listing-col-grid">
            <span>Therapist</span>
            <span>Type</span>
            <span>Service</span>
            <span></span>
          </div>

          <!-- Rows -->
          ${THERAPISTS.map(t => `
            <a
              href="profile.html?id=${t.id}&suburb=${encodeURIComponent(suburb)}&province=${encodeURIComponent(province)}"
              class="listing-row"
            >
              <span class="listing-row__name">${t.name}</span>
              <span class="listing-row__type">
                <span class="badge ${TYPE_BADGE[t.type]}">${TYPE_LABEL[t.type]}</span>
              </span>
              <span class="listing-row__service">
                <span class="badge badge--service">${t.service}</span>
              </span>
              <span class="listing-row__chevron">›</span>
            </a>`).join('')}

        </div>`;
    }
  </script>

</body>
</html>
