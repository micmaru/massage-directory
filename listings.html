<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MassageMap</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Inner page header ── */
    .header {
      position: relative;
    }

    .header__back {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--accent-light);
      font-size: var(--text-sm);
      font-weight: 500;
      text-decoration: none;
      min-width: 72px;
      padding: var(--space-2);
      margin: calc(-1 * var(--space-2));
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      transition: color var(--ease);
    }

    .header__back:hover { color: var(--text); }

    .header__page-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: var(--text-base);
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
      pointer-events: none;
      margin: 0;
    }

    /* ── Section header ── */
    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding-top: var(--space-2);
      margin-bottom: var(--space-4);
    }

    /* ── Stepper layout ── */
    .stepper-layout {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }
    .stepper-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 2px;
      flex-shrink: 0;
    }
    .stepper-ball {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
      text-decoration: none;
      line-height: 1;
    }
    .stepper-ball--active {
      background: #6c63ff;
      color: #fff;
    }
    .stepper-ball--past {
      background: #2a2f3d;
      border: 1.5px solid #4a5568;
      color: #4a5568;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .stepper-ball--past:hover {
      border-color: #6c63ff;
      color: #6c63ff;
    }
    .stepper-line {
      width: 1.5px;
      height: 20px;
      background: #2a2f3d;
    }
    .content-col {
      flex: 1;
      min-width: 0;
    }

    /* ── Listing cards ── */
    .listing-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #161b27;
      border: 0.5px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 12px 16px;
      text-decoration: none;
      color: var(--text);
      margin-bottom: var(--space-3);
      transition: background var(--ease);
      -webkit-tap-highlight-color: transparent;
    }
    .listing-card:hover { background: #1c2436; }
    .listing-card__body {
      display: flex;
      flex-direction: column;
      gap: 5px;
      overflow: hidden;
    }
    .listing-card__name {
      font-size: 15px;
      font-weight: 500;
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .listing-card__meta {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .listing-card__gender {
      font-size: 15px;
      font-weight: 400;
      color: #94a3b8;
    }
    .listing-card__chevron {
      font-size: 20px;
      color: #6c63ff;
      flex-shrink: 0;
      margin-left: 8px;
      line-height: 1;
    }

    /* ── Massage type badge ── */
    .mtype-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      line-height: 1.4;
      white-space: nowrap;
    }
    .mtype--massage { background: #3C3489; color: #CECBF6; }
    .mtype--adult   { background: #854F0B; color: #FAC775; }
    .mtype--chinese { background: #085041; color: #9FE1CB; }
    .mtype--indian  { background: #085041; color: #9FE1CB; }
    .mtype--sport   { background: #0C447C; color: #B5D4F4; }
    .mtype--reiki   { background: #3C3489; color: #CECBF6; }

    /* ── Empty / error state ── */
    .empty-state {
      text-align: center;
      padding: var(--space-8) var(--space-4);
      color: var(--text-muted);
    }
    .empty-state__icon {
      font-size: 2.5rem;
      margin-bottom: var(--space-3);
    }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════════
       Fixed Header
  ══════════════════════════════════════ -->
  <header class="header">
    <a id="backBtn" href="suburb.html" class="header__back">‹ Back</a>
    <h1 class="header__page-title" id="pageTitle">Suburb</h1>
    <div style="min-width:72px"></div>
  </header>


  <!-- ══════════════════════════════════════
       Main Content
  ══════════════════════════════════════ -->
  <main class="page">

    <div class="stepper-layout">
      <div class="stepper-col" id="stepperCol"></div>
      <div class="content-col">

        <div class="section-header">
          <span class="section-title" style="margin:0">Therapists</span>
          <span class="text-muted text-sm" id="summary"></span>
        </div>

        <div id="content"></div>

      </div>
    </div>

  </main>


  <!-- ══════════════════════════════════════
       Bottom Navigation
  ══════════════════════════════════════ -->
  <nav class="bottom-nav" aria-label="Main navigation">
    <ul class="bottom-nav__list">
      <li class="bottom-nav__item">
        <a href="index.html" class="bottom-nav__link">
          <span aria-hidden="true">🏠</span>
          <span>Home</span>
        </a>
      </li>
      <li class="bottom-nav__item">
        <button class="bottom-nav__link">
          <span aria-hidden="true">🗺️</span>
          <span>Map</span>
        </button>
      </li>
      <li class="bottom-nav__item">
        <button class="bottom-nav__link">
          <span aria-hidden="true">✍️</span>
          <span>Register</span>
        </button>
      </li>
      <li class="bottom-nav__item">
        <button class="bottom-nav__link">
          <span aria-hidden="true">⚙️</span>
          <span>Admin</span>
        </button>
      </li>
    </ul>
  </nav>


  <script type="module">
    import { db } from './firebase-config.js';
    import { collection, query, where, getDocs }
      from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

    /* ── URL params ───────────────────────────────────────── */
    const params   = new URLSearchParams(window.location.search);
    const suburb   = params.get('suburb')   || '';
    const province = params.get('province') || '';
    const type     = params.get('type')     || '';

    /* ── Back button ──────────────────────────────────────── */
    {
      let backHref = 'suburb.html';
      const bp = [];
      if (type)     bp.push(`type=${encodeURIComponent(type)}`);
      if (province) bp.push(`province=${encodeURIComponent(province)}`);
      if (bp.length) backHref += '?' + bp.join('&');
      document.getElementById('backBtn').href = backHref;
    }

    /* ── Page title ───────────────────────────────────────── */
    document.title = suburb ? `${suburb} — MassageMap` : 'MassageMap';
    document.getElementById('pageTitle').textContent = suburb || 'Therapists';

    /* ── DOM refs ─────────────────────────────────────────── */
    const content = document.getElementById('content');
    const summary = document.getElementById('summary');

    /* ── Stepper ─────────────────────────────────────────── */
    (function buildStepper() {
      const col = document.getElementById('stepperCol');
      const hrefs = [
        'index.html',
        `suburb.html?type=${encodeURIComponent(type)}`,
        `suburb.html?type=${encodeURIComponent(type)}&province=${encodeURIComponent(province)}`,
      ];
      let html = '';
      for (let i = 0; i < 4; i++) {
        if (i > 0) html += '<div class="stepper-line"></div>';
        const n = i + 1;
        if (n === 4) {
          html += `<div class="stepper-ball stepper-ball--active">${n}</div>`;
        } else {
          html += `<a href="${hrefs[i]}" class="stepper-ball stepper-ball--past">${n}</a>`;
        }
      }
      col.innerHTML = html;
    })();

    /* ── Helpers ─────────────────────────────────────────── */
    function massageTypeBadge(val) {
      const label = (val || 'Massage').trim();
      const clsMap = {
        'Massage': 'mtype--massage',
        'Adult':   'mtype--adult',
        'Chinese': 'mtype--chinese',
        'Indian':  'mtype--indian',
        'Sport':   'mtype--sport',
        'Reiki':   'mtype--reiki',
      };
      const cls = clsMap[label] || 'mtype--massage';
      return `<span class="mtype-badge ${cls}">${label}</span>`;
    }

    function genderLabel(g) {
      if (g === 'female') return 'Female';
      if (g === 'male')   return 'Male';
      return g || '';
    }

    /* ── Load & render ────────────────────────────────────── */
    async function init() {
      if (!suburb) {
        content.innerHTML = `
          <div class="empty-state">
            <div class="empty-state__icon">🔍</div>
            <p>No suburb specified</p>
            <p class="text-sm text-muted" style="margin-top:var(--space-2)">
              <a href="index.html">← Back to home</a>
            </p>
          </div>`;
        return;
      }

      content.innerHTML =
        '<p style="color:var(--text-muted);font-size:var(--text-sm);padding:var(--space-4)">Loading…</p>';

      try {
        const constraints = [
          where('suburb', '==', suburb),
          where('status', '==', 'active'),
        ];
        if (type) constraints.push(where('supplierType', '==', type));

        const snap = await getDocs(query(collection(db, 'suppliers'), ...constraints));

        // Filter out adult classification
        const therapists = [];
        snap.forEach(docSnap => {
          const d = docSnap.data();
          if (d.classification === 'adult') return;
          therapists.push({ id: docSnap.id, ...d });
        });

        if (therapists.length === 0) {
          summary.textContent = '0 therapists';
          content.innerHTML = `
            <div class="empty-state">
              <div class="empty-state__icon">💆</div>
              <p>No therapists found in ${suburb}</p>
              <p class="text-sm text-muted" style="margin-top:var(--space-2)">
                <a href="index.html">← Back to home</a>
              </p>
            </div>`;
          return;
        }

        summary.textContent = `${therapists.length} therapist${therapists.length !== 1 ? 's' : ''}`;

        const profileBase = `profile.html?suburb=${encodeURIComponent(suburb)}&province=${encodeURIComponent(province)}${type ? `&type=${encodeURIComponent(type)}` : ''}`;

        content.innerHTML = therapists.map(t => {
          const gl = type !== 'spa' ? genderLabel(t.therapistGender) : '';
          return `
            <a href="${profileBase}&id=${t.id}" class="listing-card">
              <div class="listing-card__body">
                <div class="listing-card__name">${t.displayName || ''}${gl ? `<span class="listing-card__gender"> · ${gl}</span>` : ''}</div>
                <div class="listing-card__meta">
                  ${massageTypeBadge(t.displayMassageType)}
                </div>
              </div>
              <span class="listing-card__chevron">›</span>
            </a>`;
        }).join('');

      } catch (err) {
        console.error('Firestore error:', err);
        content.innerHTML =
          '<p style="color:var(--text-muted);padding:var(--space-4)">Failed to load. Please refresh.</p>';
      }
    }

    init();
  </script>

</body>
</html>
