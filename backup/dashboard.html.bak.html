<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MassageMap — Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background: #f8f5f0 !important; color: #1a1a1a !important; }
    .acc-section { background: #fff; border: 1px solid #e0dbd4; border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
    .acc-header { display: flex; align-items: center; gap: 12px; padding: 16px 20px; cursor: pointer; }
    .acc-num { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #e0dbd4; background: #f8f5f0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #666; flex-shrink: 0; }
    .acc-num--done { background: #1a7a6e; border-color: #1a7a6e; color: #fff; }
    .acc-info { flex: 1; }
    .acc-name { font-size: 15px; font-weight: 600; color: #1a1a1a; }
    .acc-status { font-size: 12px; color: #888; margin-top: 2px; }
    .acc-status--done { color: #1a7a6e; font-weight: 500; }
    .acc-chevron { color: #888; transition: transform 0.22s ease; flex-shrink: 0; }
    .acc-chevron--open { transform: rotate(180deg); }
    .acc-body { padding: 20px; border-top: 1px solid #e0dbd4; }
    .acc-body.hidden { display: none !important; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field__label { font-size: 13px; font-weight: 600; color: #444; }
    .field-stack { display: flex; flex-direction: column; gap: 16px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="topBar" style="background:#1a7a6e;color:#fff;padding:16px 20px;display:flex;align-items:center;position:relative;">
    <span style="font-size:20px;cursor:pointer;line-height:1;">&#9776;</span>
    <span style="position:absolute;left:50%;transform:translateX(-50%);font-weight:600;font-size:15px;">My Profile</span>
  </div>

  <div id="nameBar" style="background:#fff;padding:12px 20px;border-bottom:1px solid #e0dbd4;font-size:15px;"></div>

  <div id="accordion" style="padding:16px;"></div>

  <div id="signOutBar" style="padding:24px 16px;">
    <button onclick="signOut()" style="width:100%;background:#c9a84c;color:#fff;border:none;border-radius:999px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;">Sign Out</button>
  </div>

  <script type="module">
    import { getAuth, signOut as fbSignOut } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js';
    import { getFirestore, doc, getDoc, collection, query, where, getDocs } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';
    import { app, db } from './firebase-config.js';

    document.addEventListener('DOMContentLoaded', loadDashboard);

    async function loadDashboard() {
      document.body.style.background = '#f8f5f0';
      const sessionKey = Object.keys(localStorage).find(k => k.startsWith('mm_session_'));
      if (!sessionKey) {
        window.location.href = 'index.html';
        return;
      }

      const phone = sessionKey.replace('mm_session_', '');
      JSON.parse(localStorage.getItem(sessionKey));

      const snap = await getDoc(doc(db, 'suppliers', phone));
      if (!snap.exists()) {
        window.location.href = 'index.html';
        return;
      }

      window.supplierData = snap.data();
      window.supplierPhone = phone;
      window.isSpa = window.supplierData.supplierType === 'spa';

      document.getElementById('nameBar').textContent = window.supplierData.displayName;

      if (window.isSpa) {
        renderSpa();
      } else {
        renderTherapist();
      }
    }

    async function loadAmenities() {
      const container = document.getElementById('amenitiesGroup');
      if (!container) return;
      try {
        const snap = await getDocs(
          query(collection(db, 'offerings'),
            where('category', '==', 'amenities'),
            where('launchActive', '==', true))
        );
        const saved = window.supplierData.amenities || [];
        const items = snap.docs.map(d => d.data()).sort((a,b) => (a.sortOrder||0)-(b.sortOrder||0));
        if (items.length === 0) { container.innerHTML = 'No amenities available.'; return; }
        container.innerHTML = items.map(item => `
      <label class="check-item">
        <input type="checkbox" name="amenities" value="${item.name}" ${saved.includes(item.name)?'checked':''}/>
        <span class="check-item__label">${item.name}</span>
      </label>`).join('');
      } catch(err) {
        console.error('loadAmenities error:', err);
        container.innerHTML = 'Could not load amenities.';
      }
    }

    function buildWeeklyHoursGrid(saved) {
      const container = document.getElementById('weeklyHoursGrid');
      if (!container) return;
      const DAYS = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
      const LABELS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
      const pad = n => String(n).padStart(2,'0');
      function timeOptions(selected, isTo) {
        let out = '';
        const start = isTo ? 2 : 1;
        const end = isTo ? 24 : 23;
        for (let h = start; h <= end; h++) {
          const label = h === 24 ? '24:00' : pad(h)+':00';
          out += `<option value="${h}" ${h===selected?'selected':''}>${label}</option>`;
        }
        return out;
      }
      container.innerHTML = '';
      DAYS.forEach((day, i) => {
        const s = saved[day] || {};
        const avail = s.available !== false && (i < 5);
        const from = s.from || 9;
        const to = s.to || 17;
        const row = document.createElement('div');
        row.className = 'hours-row';
        row.innerHTML = `
      <span class="hours-row__day">${LABELS[i]}</span>
      <label class="toggle" style="width:40px;height:22px;flex-shrink:0;">
        <input type="checkbox" id="day-${day}" ${avail?'checked':''}
          onchange="onDayToggle('${day}')"
          style="opacity:0;width:0;height:0;position:absolute;"/>
        <span class="toggle__track" style="border-radius:11px;"></span>
      </label>
      <div class="hours-row__times" id="dayTimes-${day}" style="opacity:${avail?'1':'0.3'}">
        <select class="select--sm" id="dayFrom-${day}" ${avail?'':'disabled'}>${timeOptions(from,false)}</select>
        <span class="hours-row__sep">–</span>
        <select class="select--sm" id="dayTo-${day}" ${avail?'':'disabled'}>${timeOptions(to,true)}</select>
      </div>`;
        container.appendChild(row);
      });
      window.onDayToggle = function(day) {
        const checked = document.getElementById('day-'+day).checked;
        const el = document.getElementById('dayTimes-'+day);
        el.style.opacity = checked ? '1' : '0.3';
        el.querySelectorAll('select').forEach(s => { s.disabled = !checked; });
      };
    }

    async function loadServices() {
      try {
        const snap = await getDocs(
          query(collection(db, 'offerings'), where('launchActive', '==', true))
        );
        const all = snap.docs.map(d => d.data()).sort((a,b) => (a.sortOrder||0)-(b.sortOrder||0));
        const d = window.supplierData;

        function renderGroup(category, containerId, savedField) {
          const container = document.getElementById(containerId);
          if (!container) return;
          const saved = d[savedField] || [];
          const items = all.filter(o => o.category === category &&
            (!o.visibleTo || o.visibleTo.includes('individual') || o.visibleTo.includes('therapist') || o.visibleTo.includes('both')));
          if (items.length === 0) { container.innerHTML = 'None available.'; return; }
          container.innerHTML = items.map(item => `
        <label class="check-item">
          <input type="checkbox" name="${savedField}" value="${item.name}"
            ${saved.includes(item.name)?'checked':''}/>
          <span class="check-item__label">${item.name}</span>
        </label>`).join('');
        }

        renderGroup('massageStyles',    'massageStylesGroup',    'massageStyles');
        renderGroup('traditions',       'traditionsGroup',       'traditions');
        renderGroup('treatments',       'treatmentsGroup',       'treatments');
        renderGroup('classification',   'classificationGroup',   'classification');
        renderGroup('serviceOfferings', 'serviceOfferingsGroup', 'serviceOfferings');

      } catch(err) {
        console.error('loadServices error:', err);
      }
    }

    function renderTherapist() {
      const d = window.supplierData;
      const acc = document.getElementById('accordion');
      acc.innerHTML = '';

      acc.innerHTML += `<div class="acc-section" id="accSec1">
<div class="acc-header" onclick="toggleAcc(1)">
<div class="acc-num" id="accNum1">1</div>
<div class="acc-info"><div class="acc-name">Personal</div>
<div class="acc-status" id="accSt1">Read only</div></div>
<svg class="acc-chevron" id="accChev1" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
</div>
<div class="acc-body hidden" id="accBody1">
<div class="field-stack">
<div class="field"><label class="field__label">First Name</label><input class="input input--locked" value="${d.firstName||''}" readonly /></div>
<div class="field"><label class="field__label">Last Name</label><input class="input input--locked" value="${d.lastName||''}" readonly /></div>
<div class="field"><label class="field__label">Display Name</label><input class="input input--locked" value="${d.displayName||''}" readonly /></div>
<div class="field"><label class="field__label">Gender</label><input class="input input--locked" value="${d.gender||''}" readonly /></div>
</div></div></div>`;

      acc.innerHTML += `<div class="acc-section" id="accSec2">
<div class="acc-header" onclick="toggleAcc(2)">
<div class="acc-num" id="accNum2">2</div>
<div class="acc-info"><div class="acc-name">Account</div>
<div class="acc-status" id="accSt2">Not saved</div></div>
<svg class="acc-chevron" id="accChev2" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
</div>
<div class="acc-body hidden" id="accBody2">
<div class="field-stack">
<div class="field"><label class="field__label">Cell Number</label><input class="input input--locked" value="${d.cellNumber||''}" readonly /></div>
<div class="field"><label class="field__label">WhatsApp Number</label><input class="input" id="whatsappNumber" value="${d.whatsappNumber||''}" type="tel" /></div>
<div class="toggle-wrap"><div class="toggle-wrap__label">Show WhatsApp on listing</div>
<label class="toggle"><input type="checkbox" id="showWhatsapp" ${d.showWhatsapp?'checked':''}/><span class="toggle__track"></span></label></div>
<div class="field"><label class="field__label">Email</label><input class="input" id="email" value="${d.email||''}" type="email" /></div>
<div><div class="form-section-label">Contact Preferences</div>
<div class="check-group">
<label class="check-item"><input type="checkbox" value="sms" checked disabled /><span class="check-item__label">SMS</span></label>
<label class="check-item"><input type="checkbox" id="cpEmail" value="email" ${(d.contactPreferences||[]).includes('email')?'checked':''}/><span class="check-item__label">Email</span></label>
<label class="check-item"><input type="checkbox" id="cpWhatsapp" value="whatsapp" ${(d.contactPreferences||[]).includes('whatsapp')?'checked':''}/><span class="check-item__label">WhatsApp</span></label>
</div></div>
</div>
<button class="btn btn--primary btn--full" style="margin-top:20px;" onclick="saveSection(2)">Save — Account</button>
</div></div>`;

      window.toggleAcc = function(n) {
        for (let i = 1; i <= 8; i++) {
          const b = document.getElementById('accBody'+i);
          const c = document.getElementById('accChev'+i);
          if (!b) continue;
          if (i===n) { b.classList.toggle('hidden'); c.classList.toggle('acc-chevron--open'); }
          else { b.classList.add('hidden'); c.classList.remove('acc-chevron--open'); }
        }
      };

      acc.innerHTML += `<div class="acc-section" id="accSec3">
<div class="acc-header" onclick="toggleAcc(3)">
<div class="acc-num" id="accNum3">3</div>
<div class="acc-info"><div class="acc-name">Location</div>
<div class="acc-status" id="accSt3">Not saved</div></div>
<svg class="acc-chevron" id="accChev3" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
</div>
<div class="acc-body hidden" id="accBody3">
<div class="field-stack">
<div class="field"><label class="field__label">Province</label><input class="input input--locked" value="${d.province||''}" readonly /></div>
<div class="field"><label class="field__label">Suburb</label><input class="input input--locked" value="${d.suburb||''}" readonly /></div>
<div class="field"><label class="field__label">Street Address</label><input class="input" id="addressLine1" value="${d.addressLine1||''}" type="text" /></div>
<div class="toggle-wrap"><div class="toggle-wrap__label">Show full address publicly</div>
<label class="toggle"><input type="checkbox" id="addressVisible" ${d.addressVisible?'checked':''}/><span class="toggle__track"></span></label></div>
</div>
<button class="btn btn--primary btn--full" style="margin-top:20px;" onclick="saveSection(3)">Save — Location</button>
</div></div>`;

      acc.innerHTML += `<div class="acc-section" id="accSec4">
<div class="acc-header" onclick="toggleAcc(4)">
<div class="acc-num" id="accNum4">4</div>
<div class="acc-info"><div class="acc-name">Premises &amp; Facilities</div>
<div class="acc-status" id="accSt4">Not saved</div></div>
<svg class="acc-chevron" id="accChev4" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
</div>
<div class="acc-body hidden" id="accBody4">
<div class="field-stack">
<div><div class="form-section-label">Premises Type</div>
<div class="radio-group radio-group--row">
<label class="radio-item radio-item--flex"><input type="radio" name="premisesType" value="home" ${d.premisesType==='home'?'checked':''}/><span class="radio-item__label">Home</span></label>
<label class="radio-item radio-item--flex"><input type="radio" name="premisesType" value="business" ${d.premisesType==='business'?'checked':''}/><span class="radio-item__label">Business</span></label>
</div></div>
<div class="toggle-wrap"><div class="toggle-wrap__label">Mobile massage available</div>
<label class="toggle"><input type="checkbox" id="mobileAvailable" ${d.mobileAvailable?'checked':''} onchange="toggleTravelKm()"/><span class="toggle__track"></span></label></div>
<div class="field ${d.mobileAvailable?'':'hidden'}" id="travelKmField">
<label class="field__label">Willing to travel up to</label>
<select class="select" id="willingToTravelKm">
<option value="10" ${d.willingToTravelKm==10?'selected':''}>10 km</option>
<option value="25" ${d.willingToTravelKm==25?'selected':''}>25 km</option>
<option value="50" ${d.willingToTravelKm==50?'selected':''}>50 km</option>
<option value="100" ${d.willingToTravelKm==100?'selected':''}>100 km</option>
</select></div>
<div><div class="form-section-label">Amenities</div>
<div id="amenitiesGroup" class="check-group">Loading...</div></div>
</div>
<button class="btn btn--primary btn--full" style="margin-top:20px;" onclick="saveSection(4)">Save — Premises &amp; Facilities</button>
</div></div>`;

      window.toggleTravelKm = function() {
        document.getElementById('travelKmField').classList.toggle('hidden', !document.getElementById('mobileAvailable').checked);
      };

      window.saveSection = async function(n) {
        const { setDoc, doc: fsDoc } = await import('https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js');
        const ref = fsDoc(db, 'suppliers', window.supplierPhone);
        const DAYS = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
        let data = {};

        if (n === 2) {
          const cp = ['sms'];
          if (document.getElementById('cpEmail')?.checked) cp.push('email');
          if (document.getElementById('cpWhatsapp')?.checked) cp.push('whatsapp');
          data = {
            whatsappNumber: document.getElementById('whatsappNumber').value.trim() || null,
            showWhatsapp: document.getElementById('showWhatsapp').checked,
            email: document.getElementById('email').value.trim() || null,
            contactPreferences: cp
          };
        } else if (n === 3) {
          data = {
            addressLine1: document.getElementById('addressLine1').value.trim() || null,
            addressVisible: document.getElementById('addressVisible').checked
          };
        } else if (n === 4) {
          const amenities = Array.from(document.querySelectorAll('input[name="amenities"]:checked')).map(c=>c.value);
          data = {
            premisesType: document.querySelector('input[name="premisesType"]:checked')?.value || null,
            mobileAvailable: document.getElementById('mobileAvailable').checked,
            willingToTravelKm: document.getElementById('mobileAvailable').checked
              ? parseInt(document.getElementById('willingToTravelKm').value) : null,
            amenities
          };
        } else if (n === 5) {
          data = {
            genderServed: document.querySelector('input[name="genderServed"]:checked')?.value || null,
            experienceYears: document.getElementById('experienceYears').value || null,
            aboutMe: document.getElementById('aboutMe').value.trim() || null,
            qualifications: document.getElementById('qualifications').value.trim() || null,
            associationMembership: Array.from(document.querySelectorAll('input[name="assoc"]:checked')).map(c=>c.value),
            specialsText: document.getElementById('specialsText').value.trim() || null
          };
        } else if (n === 6) {
          const weeklyHours = {};
          DAYS.forEach(day => {
            const avail = document.getElementById('day-'+day).checked;
            weeklyHours[day] = {
              available: avail,
              from: avail ? parseInt(document.getElementById('dayFrom-'+day).value) : null,
              to: avail ? parseInt(document.getElementById('dayTo-'+day).value) : null
            };
          });
          data = { weeklyHours, availableOutsideHours: document.getElementById('availableOutsideHours').checked };
        } else if (n === 7) {
          const gc = name => Array.from(document.querySelectorAll(`input[name="${name}"]:checked`)).map(c=>c.value);
          data = {
            massageStyles: gc('massageStyles'),
            traditions: gc('traditions'),
            treatments: gc('treatments'),
            classification: gc('classification'),
            serviceOfferings: gc('serviceOfferings')
          };
        }

        if (Object.keys(data).length === 0) return;
        try {
          await setDoc(ref, { ...data, lastUpdated: new Date() }, { merge: true });
          const st = document.getElementById('accSt'+n);
          if (st) { st.textContent = 'Saved'; st.classList.add('acc-status--done'); }
          const num = document.getElementById('accNum'+n);
          if (num) { num.textContent = '✓'; num.classList.add('acc-num--done'); }
        } catch(err) {
          console.error('saveSection error:', err);
          alert('Save failed. Please try again.');
        }
      };

      acc.innerHTML += `<div class="acc-section" id="accSec5">
<div class="acc-header" onclick="toggleAcc(5)">
<div class="acc-num" id="accNum5">5</div>
<div class="acc-info"><div class="acc-name">About</div>
<div class="acc-status" id="accSt5">Not saved</div></div>
<svg class="acc-chevron" id="accChev5" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
</div>
<div class="acc-body hidden" id="accBody5">
<div class="field-stack">
<div><div class="form-section-label">Genders Served</div>
<div class="radio-group radio-group--row">
<label class="radio-item radio-item--flex"><input type="radio" name="genderServed" value="female" ${d.genderServed==='female'?'checked':''}/><span class="radio-item__label">Ladies</span></label>
<label class="radio-item radio-item--flex"><input type="radio" name="genderServed" value="male" ${d.genderServed==='male'?'checked':''}/><span class="radio-item__label">Gents</span></label>
<label class="radio-item radio-item--flex"><input type="radio" name="genderServed" value="both" ${d.genderServed==='both'?'checked':''}/><span class="radio-item__label">Both</span></label>
</div></div>
<div class="field"><label class="field__label">Years of Experience</label>
<select class="select" id="experienceYears">
<option value="">Select...</option>
<option value="0-1" ${d.experienceYears==='0-1'?'selected':''}>Less than 1 year</option>
<option value="1-3" ${d.experienceYears==='1-3'?'selected':''}>1-3 years</option>
<option value="3-5" ${d.experienceYears==='3-5'?'selected':''}>3-5 years</option>
<option value="5+" ${d.experienceYears==='5+'?'selected':''}>5+ years</option>
</select></div>
<div class="field"><label class="field__label">About Me</label>
<textarea class="textarea" id="aboutMe" maxlength="300" oninput="document.getElementById('aboutMeCount').textContent=this.value.length+' / 300'">${d.aboutMe||''}</textarea>
<div class="char-count" id="aboutMeCount">${(d.aboutMe||'').length} / 300</div></div>
<div class="field"><label class="field__label">Qualifications</label>
<input class="input" id="qualifications" value="${d.qualifications||''}" type="text" /></div>
<div><div class="form-section-label">Professional Associations</div>
<div class="check-group check-group--1col">
<label class="check-item"><input type="checkbox" name="assoc" value="AHPCSA" ${(d.associationMembership||[]).includes('AHPCSA')?'checked':''}/><span class="check-item__label">AHPCSA</span></label>
<label class="check-item"><input type="checkbox" name="assoc" value="MTASA" ${(d.associationMembership||[]).includes('MTASA')?'checked':''}/><span class="check-item__label">MTASA</span></label>
<label class="check-item"><input type="checkbox" name="assoc" value="SAAHIP" ${(d.associationMembership||[]).includes('SAAHIP')?'checked':''}/><span class="check-item__label">SAAHIP</span></label>
<label class="check-item"><input type="checkbox" name="assoc" value="SPAASA" ${(d.associationMembership||[]).includes('SPAASA')?'checked':''}/><span class="check-item__label">SPAASA</span></label>
</div></div>
<div class="field"><label class="field__label">Specials / Promotions</label>
<textarea class="textarea textarea--sm" id="specialsText" maxlength="300">${d.specialsText||''}</textarea></div>
</div>
<button class="btn btn--primary btn--full" style="margin-top:20px;" onclick="saveSection(5)">Save — About</button>
</div></div>`;

      acc.innerHTML += `<div class="acc-section" id="accSec6">
<div class="acc-header" onclick="toggleAcc(6)">
<div class="acc-num" id="accNum6">6</div>
<div class="acc-info"><div class="acc-name">Availability</div>
<div class="acc-status" id="accSt6">Not saved</div></div>
<svg class="acc-chevron" id="accChev6" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
</div>
<div class="acc-body hidden" id="accBody6">
<div class="field-stack">
<div><div class="form-section-label">Working Hours</div>
<div class="hours-grid" id="weeklyHoursGrid"></div></div>
<label style="display:flex;align-items:center;gap:12px;cursor:pointer;">
<input type="checkbox" id="availableOutsideHours" ${d.availableOutsideHours?'checked':''} style="width:16px;height:16px;accent-color:var(--accent);"/>
<span style="font-size:var(--text-sm);color:var(--text);">Available outside listed hours by arrangement</span>
</label>
</div>
<button class="btn btn--primary btn--full" style="margin-top:20px;" onclick="saveSection(6)">Save — Availability</button>
</div></div>`;

      buildWeeklyHoursGrid(d.weeklyHours || {});

      acc.innerHTML += `<div class="acc-section" id="accSec7">
<div class="acc-header" onclick="toggleAcc(7)">
<div class="acc-num" id="accNum7">7</div>
