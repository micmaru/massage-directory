<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choose Your Plan — MassageMap</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { padding-top: 0; padding-bottom: var(--space-8); }

    /* ── Header ── */
    .sub-header {
      height: 56px; display: flex; align-items: center; justify-content: center;
      border-bottom: 1px solid var(--border); background: var(--bg);
    }
    .sub-logo {
      font-size: var(--text-lg); font-weight: 700; letter-spacing: -0.3px; color: var(--text);
    }
    .sub-logo span { color: var(--accent); }

    /* ── Hero ── */
    .sub-hero {
      text-align: center; padding: var(--space-8) var(--space-5) var(--space-5);
      max-width: 560px; margin: 0 auto;
    }
    .sub-hero__title {
      font-size: var(--text-2xl); font-weight: 700; color: var(--text);
      line-height: 1.2; margin-bottom: var(--space-3);
    }
    .sub-hero__sub {
      font-size: var(--text-base); color: var(--text-muted); line-height: 1.5;
    }

    /* ── Cards grid ── */
    .sub-cards {
      display: flex; flex-direction: column; gap: var(--space-4);
      max-width: 560px; margin: 0 auto; padding: 0 var(--space-5);
    }

    /* ── Plan card ── */
    .plan-card {
      position: relative; background: var(--bg-card); border: 1px solid var(--accent);
      border-radius: var(--radius); padding: var(--space-5);
    }

    .plan-badge {
      position: absolute; top: -1px; right: var(--space-4);
      background: var(--accent); color: #fff;
      font-size: var(--text-xs); font-weight: 700; letter-spacing: 0.3px;
      padding: 4px 12px; border-radius: 0 0 8px 8px;
    }

    .plan-term {
      font-size: var(--text-xl); font-weight: 700; color: var(--text);
      margin-bottom: var(--space-1);
    }
    .plan-monthly {
      font-size: var(--text-lg); font-weight: 600; color: var(--text);
      margin-bottom: var(--space-1);
    }
    .plan-total {
      font-size: var(--text-base); font-weight: 700; color: var(--text);
      margin-bottom: var(--space-2);
    }
    .plan-save {
      font-size: var(--text-sm); font-weight: 600; color: var(--accent);
      margin-bottom: var(--space-4);
      min-height: 18px;
    }

    /* ── Button ── */
    .plan-btn {
      display: block; width: 100%; padding: 14px var(--space-4);
      background: var(--accent); color: #fff; border: none; border-radius: 999px;
      font-family: var(--font-sans); font-size: var(--text-base); font-weight: 700;
      cursor: pointer; text-align: center; letter-spacing: 0.1px;
      transition: opacity var(--ease); -webkit-tap-highlight-color: transparent;
      margin-bottom: var(--space-3);
    }
    .plan-btn:hover { opacity: 0.88; }

    /* ── Fine print ── */
    .plan-note {
      font-size: var(--text-xs); color: var(--text-muted); line-height: 1.4;
    }

    /* ── Price protection ── */
    .sub-protection {
      max-width: 560px; margin: var(--space-6) auto 0;
      padding: 0 var(--space-5); text-align: center;
    }
    .sub-protection p {
      font-size: var(--text-xs); color: var(--text-muted); line-height: 1.5;
    }

    /* ── Loading / error states ── */
    .sub-status {
      text-align: center; padding: var(--space-8) var(--space-5);
      font-size: var(--text-sm); color: var(--text-muted);
    }
    .sub-status--error { color: #f87171; }
  </style>
</head>
<body>

  <header class="sub-header">
    <div class="sub-logo"><span>Massage</span>Map</div>
  </header>

  <div class="sub-hero">
    <h1 class="sub-hero__title">You're registered! Choose your plan to go live.</h1>
    <p class="sub-hero__sub">Select the term that works for you — longer terms save you more.</p>
  </div>

  <div id="subStatus" class="sub-status">Loading plans…</div>

  <div id="subCards" class="sub-cards" style="display:none"></div>

  <div id="subProtection" class="sub-protection" style="display:none">
    <p>Price locked for your paid period. If our rates increase, your current subscription is not affected — you pay the rate you signed up for, for the full term.</p>
  </div>

  <script type="module">
    import { db } from './firebase-config.js';
    import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

    const params     = new URLSearchParams(location.search);
    const supplierId = params.get('supplierId');
    const type       = params.get('type');

    if (!supplierId || !type) {
      location.replace('register.html');
    }

    const PLANS = [
      { months: 1,  discountPct: 0,  saveLabel: null,      badge: null           },
      { months: 3,  discountPct: 3,  saveLabel: 'Save 3%', badge: null           },
      { months: 6,  discountPct: 5,  saveLabel: 'Save 5%', badge: 'Popular Choice' },
      { months: 12, discountPct: 10, saveLabel: 'Save 10%', badge: 'Best Value'   },
    ];

    function termLabel(months) {
      return months === 1 ? '1 Month' : `${months} Months`;
    }

    function buildCard(months, discountPct, saveLabel, badge, basePrice) {
      const discounted = basePrice * (1 - discountPct / 100);
      const monthly    = Math.round(discounted);
      const total      = Math.round(discounted * months);

      const card = document.createElement('div');
      card.className = 'plan-card';

      card.innerHTML = `
        ${badge ? `<div class="plan-badge">${badge}</div>` : ''}
        <div class="plan-term">${termLabel(months)}</div>
        <div class="plan-monthly">R${monthly}/month</div>
        <div class="plan-total">Total: R${total}</div>
        <div class="plan-save">${saveLabel ? saveLabel : ''}</div>
        <button class="plan-btn" data-term="${months}" data-amount="${total}">Pay and Activate My Listing</button>
        <p class="plan-note">Your listing goes live once your ID has been verified and payment is confirmed. Listings update every 8 hours.</p>
      `;

      card.querySelector('.plan-btn').addEventListener('click', () => {
        const url = `payment.html?supplierId=${encodeURIComponent(supplierId)}&type=${encodeURIComponent(type)}&term=${months}&amount=${total}`;
        location.href = url;
      });

      return card;
    }

    async function init() {
      const statusEl     = document.getElementById('subStatus');
      const cardsEl      = document.getElementById('subCards');
      const protectionEl = document.getElementById('subProtection');

      try {
        const snap = await getDoc(doc(db, 'settings', 'config'));
        if (!snap.exists()) throw new Error('Settings not found.');

        const data       = snap.data();
        const basePrice  = type === 'spa' ? data.priceSpa : data.priceIndividual;

        if (!basePrice || isNaN(basePrice)) throw new Error('Pricing unavailable. Please contact support.');

        statusEl.style.display = 'none';

        for (const plan of PLANS) {
          cardsEl.appendChild(buildCard(plan.months, plan.discountPct, plan.saveLabel, plan.badge, basePrice));
        }

        cardsEl.style.display     = 'flex';
        protectionEl.style.display = 'block';
      } catch (err) {
        statusEl.textContent = err.message || 'Failed to load pricing. Please try again.';
        statusEl.classList.add('sub-status--error');
      }
    }

    init();
  </script>

</body>
</html>
