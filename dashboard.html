<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Dashboard — MassageMap</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { padding-top: 0; padding-bottom: var(--space-8); }

    /* ── Login ── */
    .login-wrap { min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: var(--space-5); }
    .login-card { width: 100%; max-width: 400px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: var(--space-6); }
    .login-logo { font-size: var(--text-xl); font-weight: 700; letter-spacing: -0.3px; color: var(--text); margin-bottom: var(--space-6); text-align: center; }
    .login-logo span { color: var(--accent); }
    .login-title { font-size: var(--text-lg); font-weight: 700; color: var(--text); margin-bottom: var(--space-1); }
    .login-sub { font-size: var(--text-sm); color: var(--text-muted); margin-bottom: var(--space-5); }
    .otp-row { display: flex; gap: var(--space-2); margin-top: var(--space-3); }
    .otp-input { flex: 1; letter-spacing: 4px; font-size: var(--text-lg); text-align: center; }
    .otp-status { font-size: var(--text-sm); color: var(--text-muted); margin-top: var(--space-2); }
    .otp-error { font-size: var(--text-sm); color: #f87171; margin-top: var(--space-2); display: block; }

    /* ── Dashboard ── */
    .dash-header { position: sticky; top: 0; z-index: 50; height: 56px; background: rgba(15,17,23,0.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 var(--space-4); display: flex; align-items: center; justify-content: space-between; }
    .dash-header__title { font-size: var(--text-lg); font-weight: 700; color: var(--text); }
    .dash-body { max-width: 560px; margin: 0 auto; padding: var(--space-5) var(--space-4); display: flex; flex-direction: column; gap: var(--space-4); }

    /* ── Section card ── */
    .section-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: var(--space-5); }
    .section-card__title { font-size: var(--text-xs); font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: var(--space-4); }
    .section-footer { margin-top: var(--space-4); display: flex; align-items: center; gap: var(--space-3); }
    .save-ok  { font-size: var(--text-sm); color: var(--green); }
    .save-err { font-size: var(--text-sm); color: #f87171; }

    /* ── Category pills ── */
    .cat-pill-group { display: flex; flex-wrap: wrap; gap: var(--space-2); }
    .cat-pill { display: flex; align-items: center; background: #161b27; border: 1px solid var(--border); border-radius: 999px; padding: 7px 16px; cursor: pointer; transition: background var(--ease), border-color var(--ease); -webkit-tap-highlight-color: transparent; }
    .cat-pill input[type="radio"] { display: none; }
    .cat-pill span { font-size: var(--text-sm); color: var(--text); font-weight: 500; cursor: pointer; }
    .cat-pill:has(input:checked) { background: #6c63ff; border-color: #6c63ff; }
    .cat-pill:has(input:checked) span { color: #fff; }
    .cat-pill:hover:not(:has(input:checked)) { border-color: rgba(108,99,255,0.4); }

    /* ── Checkbox group ── */
    .check-group { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-2); }
    .check-item { display: flex; align-items: center; gap: var(--space-2); background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: var(--space-2) var(--space-3); cursor: pointer; transition: border-color var(--ease), background var(--ease); -webkit-tap-highlight-color: transparent; }
    .check-item:hover { border-color: rgba(108,99,255,0.4); background: rgba(108,99,255,0.05); }
    .check-item input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
    .check-item span { font-size: var(--text-sm); color: var(--text); cursor: pointer; line-height: 1.3; }
    .check-item:has(input:checked) { border-color: var(--accent); background: rgba(108,99,255,0.08); }

    /* ── Hours grid ── */
    .hours-row { display: grid; grid-template-columns: 44px 44px 1fr; align-items: center; gap: var(--space-2); padding: var(--space-2) 0; border-bottom: 1px solid var(--border); }
    .hours-row:last-child { border-bottom: none; }
    .hours-row__day { font-size: var(--text-sm); font-weight: 600; color: var(--text); }
    .hours-row__times { display: flex; align-items: center; gap: var(--space-2); }
    .hours-row__sep { color: var(--text-muted); font-size: var(--text-sm); }
    .select--sm { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--font-sans); font-size: var(--text-sm); padding: 5px 8px; }

    /* ── Toggle ── */
    .toggle { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle__track { position: absolute; inset: 0; background: var(--bg); border: 1px solid var(--border); border-radius: 11px; cursor: pointer; transition: background var(--ease), border-color var(--ease); }
    .toggle__track::after { content: ''; position: absolute; top: 3px; left: 3px; width: 14px; height: 14px; border-radius: 50%; background: var(--text-muted); transition: transform var(--ease), background var(--ease); }
    .toggle input:checked + .toggle__track { background: var(--accent); border-color: var(--accent); }
    .toggle input:checked + .toggle__track::after { transform: translateX(18px); background: #fff; }

    /* ── Photo grid ── */
    .photo-grid { display: flex; flex-wrap: wrap; gap: var(--space-3); }
    .photo-thumb { position: relative; width: 80px; height: 80px; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .photo-del-btn { position: absolute; top: 3px; right: 3px; width: 20px; height: 20px; border-radius: 50%; background: rgba(0,0,0,0.75); border: none; color: #fff; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }
    .photo-add-btn { width: 80px; height: 80px; border-radius: 8px; border: 1.5px dashed var(--border); background: var(--bg); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-muted); font-size: 26px; transition: border-color var(--ease), color var(--ease); flex-shrink: 0; }
    .photo-add-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Loading spinner ── */
    .btn--loading { position: relative; pointer-events: none; opacity: 0.7; }
    .btn--loading::after { content: ''; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }

    /* ── Field stack ── */
    .field-stack { display: flex; flex-direction: column; gap: var(--space-3); }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════
       LOGIN SCREEN
  ══════════════════════════════════ -->
  <div id="loginScreen">
    <div class="login-wrap">
      <div class="login-card">

        <div class="login-logo">Massage<span>Map</span></div>
        <div class="login-title">Therapist Login</div>
        <div class="login-sub">Enter your cell number to access your profile.</div>

        <div class="field" id="cellField" style="margin-bottom: var(--space-4);">
          <label class="field__label" for="cellInput">Cell Number</label>
          <input type="tel" id="cellInput" class="input" placeholder="e.g. 0821234567" autocomplete="tel" />
        </div>

        <div id="recaptcha-container"></div>

        <button type="button" class="btn btn--primary btn--full" id="sendOtpBtn" onclick="sendOtp()">Send OTP</button>

        <div id="otpSection" class="hidden" style="margin-top: var(--space-4);">
          <div class="otp-status" id="otpStatusMsg"></div>
          <div class="otp-row">
            <input type="number" id="otpInput" class="input otp-input" placeholder="000000" maxlength="6" inputmode="numeric" />
            <button type="button" class="btn btn--primary" id="verifyOtpBtn" onclick="verifyOtp()">Verify</button>
          </div>
          <span class="otp-error hidden" id="otpError"></span>
        </div>

        <div id="loginError" class="hidden" style="margin-top: var(--space-3); font-size: var(--text-sm); color: #f87171;"></div>

        <p style="margin-top: var(--space-6); text-align: center; font-size: var(--text-sm); color: var(--text-muted);">
          No account yet? <a href="register.html">Register here</a>
        </p>

      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════
       DASHBOARD SCREEN
  ══════════════════════════════════ -->
  <div id="dashboardScreen" class="hidden">

    <div class="dash-header">
      <div class="dash-header__title">My Profile</div>
      <button type="button" class="btn btn--secondary btn--sm" onclick="logout()">Log out</button>
    </div>

    <div class="dash-body">

      <!-- 1. Display Name -->
      <div class="section-card">
        <div class="section-card__title">Display Name</div>
        <div class="field">
          <label class="field__label" for="f_displayName">Name shown on your listing</label>
          <input type="text" id="f_displayName" class="input" placeholder="e.g. Sarah M." />
        </div>
        <div class="section-footer">
          <button type="button" class="btn btn--primary btn--sm" id="saveBtn_name" onclick="saveSection('name')">Save</button>
          <span class="save-ok  hidden" id="st_name">Saved ✓</span>
          <span class="save-err hidden" id="se_name"></span>
        </div>
      </div>

      <!-- 2. Public Category -->
      <div class="section-card">
        <div class="section-card__title">Public Category</div>
        <div class="cat-pill-group">
          <label class="cat-pill"><input type="radio" name="displayMassageType" value="Massage"  /><span>Massage</span></label>
          <label class="cat-pill"><input type="radio" name="displayMassageType" value="Sport"    /><span>Sport</span></label>
          <label class="cat-pill"><input type="radio" name="displayMassageType" value="Reiki"    /><span>Reiki</span></label>
          <label class="cat-pill"><input type="radio" name="displayMassageType" value="Chinese"  /><span>Chinese</span></label>
          <label class="cat-pill"><input type="radio" name="displayMassageType" value="Indian"   /><span>Indian</span></label>
          <label class="cat-pill"><input type="radio" name="displayMassageType" value="Adult"    /><span>Adult</span></label>
        </div>
        <div class="section-footer">
          <button type="button" class="btn btn--primary btn--sm" id="saveBtn_category" onclick="saveSection('category')">Save</button>
          <span class="save-ok  hidden" id="st_category">Saved ✓</span>
          <span class="save-err hidden" id="se_category"></span>
        </div>
      </div>

      <!-- 3. Location -->
      <div class="section-card">
        <div class="section-card__title">Location</div>
        <div class="field-stack">
          <div class="field">
            <label class="field__label" for="f_province">Province</label>
            <select id="f_province" class="select" onchange="onProvinceChange()">
              <option value="">Select province…</option>
            </select>
          </div>
          <div class="field">
            <label class="field__label" for="f_area">Area</label>
            <select id="f_area" class="select" onchange="onAreaChange()" disabled>
              <option value="">Select area…</option>
            </select>
          </div>
          <div class="field">
            <label class="field__label" for="f_suburb">Suburb</label>
            <select id="f_suburb" class="select" disabled>
              <option value="">Select suburb…</option>
            </select>
          </div>
        </div>
        <div class="section-footer">
          <button type="button" class="btn btn--primary btn--sm" id="saveBtn_location" onclick="saveSection('location')">Save</button>
          <span class="save-ok  hidden" id="st_location">Saved ✓</span>
          <span class="save-err hidden" id="se_location"></span>
        </div>
      </div>

      <!-- 4. Weekly Hours -->
      <div class="section-card">
        <div class="section-card__title">Weekly Hours</div>
        <div id="hoursGrid"></div>
        <div class="section-footer">
          <button type="button" class="btn btn--primary btn--sm" id="saveBtn_hours" onclick="saveSection('hours')">Save</button>
          <span class="save-ok  hidden" id="st_hours">Saved ✓</span>
          <span class="save-err hidden" id="se_hours"></span>
        </div>
      </div>

      <!-- 5. Profile Photos -->
      <div class="section-card">
        <div class="section-card__title">Profile Photos</div>
        <div class="photo-grid" id="photoGrid"></div>
        <p id="photoCountMsg" style="font-size:var(--text-xs);color:var(--text-muted);margin-top:var(--space-2);"></p>
        <div class="section-footer">
          <span class="save-ok  hidden" id="st_photos">Done ✓</span>
          <span class="save-err hidden" id="se_photos"></span>
        </div>
        <input type="file" id="photoFileInput" accept="image/*" class="hidden" onchange="onPhotoFileSelected(event)" />
      </div>

      <!-- 6. Contact -->
      <div class="section-card">
        <div class="section-card__title">Contact</div>
        <div class="field-stack">
          <div class="field">
            <label class="field__label" for="f_whatsapp">WhatsApp Number</label>
            <input type="tel" id="f_whatsapp" class="input" placeholder="e.g. 0821234567" />
          </div>
          <div class="field">
            <label class="field__label" for="f_website">Website URL</label>
            <input type="url" id="f_website" class="input" placeholder="https://..." />
          </div>
        </div>
        <div class="section-footer">
          <button type="button" class="btn btn--primary btn--sm" id="saveBtn_contact" onclick="saveSection('contact')">Save</button>
          <span class="save-ok  hidden" id="st_contact">Saved ✓</span>
          <span class="save-err hidden" id="se_contact"></span>
        </div>
      </div>

      <!-- 7. Bio -->
      <div class="section-card">
        <div class="section-card__title">About Me</div>
        <div class="field">
          <label class="field__label" for="f_bio">
            Bio
            <span id="bioCount" style="font-weight:400;margin-left:var(--space-2);">0 / 300</span>
          </label>
          <textarea id="f_bio" class="textarea" rows="4" maxlength="300"
            placeholder="Tell clients about yourself…"
            oninput="document.getElementById('bioCount').textContent = this.value.length + ' / 300'"></textarea>
        </div>
        <div class="section-footer">
          <button type="button" class="btn btn--primary btn--sm" id="saveBtn_bio" onclick="saveSection('bio')">Save</button>
          <span class="save-ok  hidden" id="st_bio">Saved ✓</span>
          <span class="save-err hidden" id="se_bio"></span>
        </div>
      </div>

      <!-- 8. Services -->
      <div class="section-card">
        <div class="section-card__title">Massage Types</div>
        <div class="check-group">
          <label class="check-item"><input type="checkbox" name="types" value="Swedish"      /><span>Swedish</span></label>
          <label class="check-item"><input type="checkbox" name="types" value="Deep Tissue"  /><span>Deep Tissue</span></label>
          <label class="check-item"><input type="checkbox" name="types" value="Hot Stone"    /><span>Hot Stone</span></label>
          <label class="check-item"><input type="checkbox" name="types" value="Thai"         /><span>Thai</span></label>
          <label class="check-item"><input type="checkbox" name="types" value="Sports"       /><span>Sports</span></label>
          <label class="check-item"><input type="checkbox" name="types" value="Reflexology"  /><span>Reflexology</span></label>
          <label class="check-item"><input type="checkbox" name="types" value="Aromatherapy" /><span>Aromatherapy</span></label>
        </div>
        <div class="section-footer">
          <button type="button" class="btn btn--primary btn--sm" id="saveBtn_services" onclick="saveSection('services')">Save</button>
          <span class="save-ok  hidden" id="st_services">Saved ✓</span>
          <span class="save-err hidden" id="se_services"></span>
        </div>
      </div>

    </div>
  </div>

    const DAYS       = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
    const DAY_LABELS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

    // ════════════════════════════════════════════
    // PHONE AUTH — OTP
    // ════════════════════════════════════════════
    function formatPhone(raw) {
      const d = raw.replace(/\D/g, '');
      if (d.startsWith('27') && d.length === 11) return '+' + d;
      if (d.startsWith('0') && d.length === 10) return '+27' + d.slice(1);
      return '+' + d;
    }

    function initRecaptcha() {
      if (appVerifier) { try { appVerifier.clear(); } catch(_) {} }
      appVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { size: 'invisible' });
    }

    window.sendOtp = async function() {
      const raw = document.getElementById('cellInput').value.trim();
      const errEl  = document.getElementById('loginError');
      errEl.classList.add('hidden');
      if (!raw) { errEl.textContent = 'Please enter your cell number.'; errEl.classList.remove('hidden'); return; }

      const phone = formatPhone(raw);
      const btn   = document.getElementById('sendOtpBtn');
      btn.classList.add('btn--loading');
      btn.textContent = 'Sending…';

      try {
        initRecaptcha();
        confirmationResult = await signInWithPhoneNumber(auth, phone, appVerifier);
        document.getElementById('otpSection').classList.remove('hidden');
        document.getElementById('otpStatusMsg').textContent = `OTP sent to ${phone}. Enter the 6-digit code.`;
        btn.textContent = 'Resend OTP';
        btn.classList.remove('btn--loading');
      } catch (err) {
        console.error('OTP send error:', err);
        btn.classList.remove('btn--loading');
        btn.textContent = 'Send OTP';
        let msg = 'Could not send OTP. Please check the number and try again.';
        if (err.code === 'auth/invalid-phone-number') msg = 'Invalid phone number format.';
        if (err.code === 'auth/too-many-requests')    msg = 'Too many attempts. Please wait a few minutes.';
        errEl.textContent = msg;
        errEl.classList.remove('hidden');
        try { appVerifier.clear(); } catch(_) {}
        appVerifier = null;
      }
    };

    window.verifyOtp = async function() {
      const code  = document.getElementById('otpInput').value.trim();
      const errEl = document.getElementById('otpError');
      errEl.classList.add('hidden');
      if (code.length !== 6) { errEl.textContent = 'Please enter all 6 digits.'; errEl.classList.remove('hidden'); return; }
      if (!confirmationResult) { errEl.textContent = 'Please send OTP first.'; errEl.classList.remove('hidden'); return; }

      const btn = document.getElementById('verifyOtpBtn');
      btn.classList.add('btn--loading');
      btn.textContent = 'Verifying…';

      try {
        const credential = await confirmationResult.confirm(code);
        supplierUid = credential.user.uid;
        await loadSupplier();
      } catch (err) {
        console.error('OTP verify error:', err);
        btn.classList.remove('btn--loading');
        btn.textContent = 'Verify';
        let msg = 'Incorrect code. Please try again.';
        if (err.code === 'auth/code-expired') msg = 'OTP expired. Please request a new one.';
        errEl.textContent = msg;
        errEl.classList.remove('hidden');
      }
    };

    // ════════════════════════════════════════════
    // LOAD SUPPLIER
    // ════════════════════════════════════════════
    async function loadSupplier() {
      const errEl = document.getElementById('loginError');
      try {
        const snap = await getDoc(doc(db, 'suppliers', supplierUid));
        if (!snap.exists()) {
          errEl.textContent = 'No account found for this number. Please register first.';
          errEl.classList.remove('hidden');
          document.getElementById('verifyOtpBtn').classList.remove('btn--loading');
          document.getElementById('verifyOtpBtn').textContent = 'Verify';
          return;
        }
        populateFields(snap.data());
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('dashboardScreen').classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'instant' });
      } catch (err) {
        console.error('Load error:', err);
        errEl.textContent = 'Failed to load your profile. Please try again.';
        errEl.classList.remove('hidden');
        document.getElementById('verifyOtpBtn').classList.remove('btn--loading');
        document.getElementById('verifyOtpBtn').textContent = 'Verify';
      }
    }

    // ════════════════════════════════════════════
    // POPULATE FIELDS
    // ════════════════════════════════════════════
    function populateFields(data) {
      document.getElementById('f_displayName').value = data.displayName || '';

      const cat = data.displayMassageType;
      if (cat) {
        const r = document.querySelector(`input[name="displayMassageType"][value="${cat}"]`);
        if (r) r.checked = true;
      }

      populateProvinces();
      if (data.province) {
        document.getElementById('f_province').value = data.province;
        onProvinceChange();
        if (data.area) {
          document.getElementById('f_area').value = data.area;
          onAreaChange();
          if (data.suburb) document.getElementById('f_suburb').value = data.suburb;
        }
      }

      buildHoursGrid();
      if (data.weeklyHours) populateHoursGrid(data.weeklyHours);

      supplierPhotos = Array.isArray(data.photos) ? [...data.photos] : [];
      renderPhotoGrid();

      document.getElementById('f_whatsapp').value = data.whatsappNumber || '';
      document.getElementById('f_website').value  = data.websiteUrl     || '';

      const bio = data.aboutMe || '';
      document.getElementById('f_bio').value = bio;
      document.getElementById('bioCount').textContent = bio.length + ' / 300';

      const types = data.massageTypes || [];
      document.querySelectorAll('input[name="types"]').forEach(cb => {
        cb.checked = types.includes(cb.value);
      });
    }

    // ════════════════════════════════════════════
    // LOCATION CASCADES
    // ════════════════════════════════════════════
    function populateProvinces() {
      const sel = document.getElementById('f_province');
      sel.innerHTML = '<option value="">Select province…</option>';
      LOCATIONS.provinces.forEach(p => {
        const o = document.createElement('option');
        o.value = p.id; o.textContent = p.name;
        sel.appendChild(o);
      });
    }

    window.onProvinceChange = function() {
      const pid = document.getElementById('f_province').value;
      const areaEl   = document.getElementById('f_area');
      const suburbEl = document.getElementById('f_suburb');
      areaEl.innerHTML   = '<option value="">Select area…</option>';
      suburbEl.innerHTML = '<option value="">Select suburb…</option>';
      areaEl.disabled = true; suburbEl.disabled = true;
      if (!pid) return;
      const prov = LOCATIONS.provinces.find(p => p.id === pid);
      if (!prov) return;
      prov.areas.forEach(a => {
        const o = document.createElement('option');
        o.value = a.id; o.textContent = a.name;
        areaEl.appendChild(o);
      });
      areaEl.disabled = false;
    };

    window.onAreaChange = function() {
      const pid = document.getElementById('f_province').value;
      const aid = document.getElementById('f_area').value;
      const suburbEl = document.getElementById('f_suburb');
      suburbEl.innerHTML = '<option value="">Select suburb…</option>';
      suburbEl.disabled = true;
      if (!aid) return;
      const prov = LOCATIONS.provinces.find(p => p.id === pid);
      if (!prov) return;
      const area = prov.areas.find(a => a.id === aid);
      if (!area) return;
      area.suburbs.forEach(s => {
        const o = document.createElement('option');
        o.value = s; o.textContent = s;
        suburbEl.appendChild(o);
      });
      suburbEl.disabled = false;
    };

    // ════════════════════════════════════════════
    // WEEKLY HOURS GRID
    // ════════════════════════════════════════════
    function timeOptions(def, isTo) {
      const pad = n => String(n).padStart(2,'0');
      let out = '';
      const start = isTo ? 2 : 1;
      const end   = isTo ? 24 : 23;
      for (let h = start; h <= end; h++) {
        const lbl = h === 24 ? '24:00' : pad(h) + ':00';
        out += `<option value="${h}"${h === def ? ' selected' : ''}>${lbl}</option>`;
      }
      return out;
    }

    function buildHoursGrid() {
      const container = document.getElementById('hoursGrid');
      container.innerHTML = '';
      DAYS.forEach((day, i) => {
        const isWeekday = i < 5;
        const row = document.createElement('div');
        row.className = 'hours-row';
        row.innerHTML = `
          <span class="hours-row__day">${DAY_LABELS[i]}</span>
          <label class="toggle">
            <input type="checkbox" id="hday-${day}" ${isWeekday ? 'checked' : ''}
              onchange="onDayToggle('${day}')" />
            <span class="toggle__track"></span>
          </label>
          <div class="hours-row__times" id="hdayTimes-${day}" style="${isWeekday ? '' : 'opacity:0.3;'}">
            <select class="select--sm" id="hdayFrom-${day}" ${isWeekday ? '' : 'disabled'}>${timeOptions(9, false)}</select>
            <span class="hours-row__sep">–</span>
            <select class="select--sm" id="hdayTo-${day}"   ${isWeekday ? '' : 'disabled'}>${timeOptions(17, true)}</select>
          </div>`;
        container.appendChild(row);
      });
    }

    function populateHoursGrid(weeklyHours) {
      DAYS.forEach(day => {
        const d = weeklyHours[day];
        if (!d) return;
        const cb = document.getElementById('hday-' + day);
        if (cb) cb.checked = !!d.available;
        const timesEl = document.getElementById('hdayTimes-' + day);
        if (timesEl) timesEl.style.opacity = d.available ? '1' : '0.3';
        const fromEl = document.getElementById('hdayFrom-' + day);
        const toEl   = document.getElementById('hdayTo-'   + day);
        if (fromEl) { fromEl.value = d.from ?? 9;  fromEl.disabled = !d.available; }
        if (toEl)   { toEl.value   = d.to   ?? 17; toEl.disabled   = !d.available; }
      });
    }

    window.onDayToggle = function(day) {
      const checked  = document.getElementById('hday-' + day).checked;
      const timesEl  = document.getElementById('hdayTimes-' + day);
      timesEl.style.opacity = checked ? '1' : '0.3';
      timesEl.querySelectorAll('select').forEach(s => { s.disabled = !checked; });
    };

    // ════════════════════════════════════════════
    // PHOTO MANAGEMENT
    // ════════════════════════════════════════════
    function renderPhotoGrid() {
      const grid = document.getElementById('photoGrid');
      grid.innerHTML = '';

      supplierPhotos.forEach((photo, idx) => {
        const url = typeof photo === 'string' ? photo : photo.url;
        if (!url) return;
        const wrap = document.createElement('div');
        wrap.className = 'photo-thumb';
        wrap.innerHTML = `
          <img src="${url}" alt="Photo ${idx + 1}" loading="lazy" />
          <button type="button" class="photo-del-btn" onclick="deletePhoto(${idx})" aria-label="Delete photo">×</button>`;
        grid.appendChild(wrap);
      });

      if (supplierPhotos.length < 5) {
        const addBtn = document.createElement('button');
        addBtn.type = 'button';
        addBtn.className = 'photo-add-btn';
        addBtn.setAttribute('aria-label', 'Add photo');
        addBtn.textContent = '+';
        addBtn.onclick = () => document.getElementById('photoFileInput').click();
        grid.appendChild(addBtn);
      }

      document.getElementById('photoCountMsg').textContent =
        supplierPhotos.length >= 5 ? 'Maximum 5 photos reached.' : `${supplierPhotos.length} / 5 photos`;
    }

    async function compressImage(file) {
      return new Promise(resolve => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          URL.revokeObjectURL(url);
          const MAX = 800;
          let { width, height } = img;
          if (width > MAX) { height = Math.round(height * MAX / width); width = MAX; }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.75);
        };
        img.src = url;
      });
    }

    window.onPhotoFileSelected = async function(event) {
      const file = event.target.files[0];
      event.target.value = '';
      if (!file || supplierPhotos.length >= 5) return;

      const stEl = document.getElementById('st_photos');
      const seEl = document.getElementById('se_photos');
      stEl.classList.add('hidden');
      seEl.classList.add('hidden');

      try {
        const blob = await compressImage(file);
        const path = `suppliers/${supplierUid}/photos/${Date.now()}-${file.name}`;
        const ref  = sRef(storage, path);
        await uploadBytes(ref, blob);
        const downloadUrl = await getDownloadURL(ref);
        const photoObj = { url: downloadUrl, storagePath: path, visibility: 'public' };

        await updateDoc(doc(db, 'suppliers', supplierUid), { photos: arrayUnion(photoObj) });
        supplierPhotos.push(photoObj);
        renderPhotoGrid();
        stEl.textContent = 'Uploaded ✓';
        stEl.classList.remove('hidden');
        setTimeout(() => stEl.classList.add('hidden'), 2000);
      } catch (err) {
        console.error('Photo upload error:', err);
        seEl.textContent = 'Upload failed. Please try again.';
        seEl.classList.remove('hidden');
      }
    };

    window.deletePhoto = async function(idx) {
      const photo = supplierPhotos[idx];
      if (!photo) return;
      const seEl = document.getElementById('se_photos');
      seEl.classList.add('hidden');

      try {
        if (photo.storagePath) {
          try { await deleteObject(sRef(storage, photo.storagePath)); } catch(_) {}
        }
        await updateDoc(doc(db, 'suppliers', supplierUid), { photos: arrayRemove(photo) });
        supplierPhotos.splice(idx, 1);
        renderPhotoGrid();
      } catch (err) {
        console.error('Delete error:', err);
        seEl.textContent = 'Could not delete photo. Please try again.';
        seEl.classList.remove('hidden');
      }
    };

    // ════════════════════════════════════════════
    // SECTION SAVES
    // ════════════════════════════════════════════
    window.saveSection = async function(section) {
      const btn   = document.getElementById('saveBtn_' + section);
      const stEl  = document.getElementById('st_' + section);
      const seEl  = document.getElementById('se_' + section);
      stEl.classList.add('hidden');
      seEl.classList.add('hidden');
      btn.classList.add('btn--loading');
      btn.textContent = 'Saving…';

      try {
        let data = {};
        switch (section) {
          case 'name':
            data = { displayName: document.getElementById('f_displayName').value.trim() };
            break;
          case 'category':
            data = { displayMassageType: document.querySelector('input[name="displayMassageType"]:checked')?.value || null };
            break;
          case 'location':
            data = {
              province: document.getElementById('f_province').value,
              area:     document.getElementById('f_area').value,
              suburb:   document.getElementById('f_suburb').value
            };
            break;
          case 'hours': {
            const weeklyHours = {};
            DAYS.forEach(day => {
              const avail = document.getElementById('hday-' + day).checked;
              weeklyHours[day] = {
                available: avail,
                from: avail ? parseInt(document.getElementById('hdayFrom-' + day).value) : null,
                to:   avail ? parseInt(document.getElementById('hdayTo-'   + day).value) : null
              };
            });
            data = { weeklyHours };
            break;
          }
          case 'contact':
            data = {
              whatsappNumber: document.getElementById('f_whatsapp').value.trim() || null,
              websiteUrl:     document.getElementById('f_website').value.trim()  || null
            };
            break;
          case 'bio':
            data = { aboutMe: document.getElementById('f_bio').value.trim() };
            break;
          case 'services':
            data = { massageTypes: Array.from(document.querySelectorAll('input[name="types"]:checked')).map(cb => cb.value) };
            break;
        }

        await updateDoc(doc(db, 'suppliers', supplierUid), data);
        btn.classList.remove('btn--loading');
        btn.textContent = 'Save';
        stEl.classList.remove('hidden');
        setTimeout(() => stEl.classList.add('hidden'), 2000);
      } catch (err) {
        console.error('Save error:', err);
        btn.classList.remove('btn--loading');
        btn.textContent = 'Save';
        seEl.textContent = 'Failed to save. Please try again.';
        seEl.classList.remove('hidden');
      }
    };

    // ════════════════════════════════════════════
    // LOGOUT
    // ════════════════════════════════════════════
    window.logout = async function() {
      await signOut(auth);
      window.location.href = 'index.html';
    };

  </script>
